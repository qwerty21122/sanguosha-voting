<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三国杀武将强度投票箱</title>
<style>
  :root{
    --bg:#eef2f7; --bg2:#e3e9f2; --card:#ffffff; --ink:#2c3440; --sub:#6b7688;
    --line:#dfe5ee; --accent:#5b7cbe; --accent2:#8aa4d6; --shadow:0 8px 24px rgba(60,80,120,.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(135deg,var(--bg),var(--bg2));
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px; background:rgba(255,255,255,.75);
    backdrop-filter:blur(6px); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;
  }
  header .brand{font-size:20px; font-weight:800; letter-spacing:1px;}
  header .brand small{font-weight:500; color:var(--sub); font-size:13px; margin-left:8px;}
  header nav button{
    border:none; background:var(--accent); color:#fff; cursor:pointer;
    padding:9px 18px; border-radius:10px; font-size:14px; font-weight:600;
    transition:.15s; box-shadow:0 3px 10px rgba(91,124,190,.3);
  }
  header nav button:hover{background:#496aa8;}
  .wrap{max-width:1180px; margin:0 auto; padding:32px 20px 60px;}
  .vote-head{text-align:center; margin-bottom:20px;}
  .vote-head h1{font-size:26px; margin:0 0 6px;}
  .vote-head p{color:var(--sub); margin:0; font-size:14px;}
  .criteria{
    max-width:760px; margin:14px auto 0; text-align:center; font-size:13.5px; color:#5a6b8c;
    background:#eef3fb; border:1px solid #dde6f5; border-radius:12px; padding:10px 18px; line-height:1.7;
  }
  .criteria b{color:var(--accent);}
  .counter{text-align:center; color:var(--sub); font-size:13px; margin-top:12px;}
  .arena{
    display:flex; align-items:stretch; justify-content:center; gap:26px;
    margin-top:22px; flex-wrap:wrap;
  }
  .pick{
    flex:1 1 440px; max-width:520px; min-height:440px; background:var(--card);
    border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; align-items:center;
    padding:34px 30px 28px; cursor:pointer; transition:.18s; position:relative; overflow:hidden;
  }
  .pick:hover{transform:translateY(-4px); border-color:var(--accent2); box-shadow:0 14px 32px rgba(60,80,120,.18);}
  .pick .faction{
    font-size:19px; font-weight:700; color:#fff; padding:6px 22px; border-radius:22px;
    margin-bottom:16px; letter-spacing:2px;
  }
  .pick .name{font-size:38px; font-weight:800; text-align:center; line-height:1.25; margin-bottom:16px;}
  .pick .desc{
    width:100%; flex:1 1 auto; color:#4a5568; font-size:14.5px; line-height:1.75;
    text-align:left; white-space:pre-line; overflow-y:auto; padding:14px 16px;
    background:#f6f8fc; border:1px solid #edf1f8; border-radius:12px; max-height:230px;
  }
  .pick .desc::-webkit-scrollbar{width:6px;}
  .pick .desc::-webkit-scrollbar-thumb{background:#cdd7e6; border-radius:6px;}
  .pick .hint{margin-top:16px; color:var(--sub); font-size:13px;}
  .vs{
    align-self:center; font-size:28px; font-weight:900; color:var(--accent);
    background:#fff; border-radius:50%; width:58px; height:58px;
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow);
    border:2px solid var(--accent2); flex:0 0 auto;
  }
  .skipbar{text-align:center; margin-top:24px;}
  .skipbar button{
    border:1px solid var(--line); background:#fff; color:var(--sub);
    padding:9px 22px; border-radius:10px; cursor:pointer; font-size:14px; transition:.15s;
  }
  .skipbar button:hover{color:var(--accent); border-color:var(--accent2);}
  .f-wei{background:#4a6fa5;} .f-shu{background:#3f9d6b;}
  .f-wu{background:#c8514e;} .f-qun{background:#8a7a4e;}
  .f-dual{background:#7a5ea8;} .f-amb{background:#555c66;} .f-yin{background:#4c8aa0;}
  .stats-panel{display:none;}
  .stats-panel.active{display:block;}
  .vote-panel.hidden{display:none;}
  .stats-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px;}
  .stats-head h2{margin:0; font-size:22px;}
  .stats-tools{display:flex; align-items:center; gap:14px; font-size:13px; color:var(--sub);}
  .stats-tools label{display:flex; align-items:center; gap:6px;}
  .stats-tools input{width:56px; padding:4px 6px; border:1px solid var(--line); border-radius:6px;}
  .stats-tools button{
    border:none; background:var(--accent); color:#fff; padding:7px 14px;
    border-radius:8px; cursor:pointer; font-size:13px;
  }
  table{width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; box-shadow:var(--shadow);}
  thead th{background:#eaf0fb; color:#3a4a66; font-size:15px; padding:14px 10px; text-align:center;}
  tbody td{padding:11px 10px; text-align:center; border-top:1px solid #f0f3f8; font-size:14px;}
  tbody tr:nth-child(even){background:#fafbfe;}
  .tier-cell{color:#fff; font-weight:700; min-width:86px;}
  .name-cell{font-weight:700;}
  .empty{text-align:center; color:var(--sub); padding:40px; font-size:15px;}
  .t0{background:#c0504d;} .t1{background:#d47a5a;} .t2{background:#dca24e;}
  .t3{background:#c9b85a;} .t4{background:#8faf6a;} .t5{background:#5fa0a0;}
  .t6{background:#5b7cbe;} .t7{background:#7a6fa8;} .t8{background:#8a8f99;}
  .name-link{color:var(--accent); cursor:pointer; text-decoration:none; border-bottom:1px dashed var(--accent2);}
  .name-link:hover{color:#3a5a99; border-bottom-style:solid;}
  .modal-mask{
    display:none; position:fixed; inset:0; background:rgba(30,40,60,.45);
    z-index:100; align-items:center; justify-content:center; padding:20px;
  }
  .modal-mask.show{display:flex;}
  .modal-box{
    background:#fff; border-radius:16px; max-width:560px; width:100%; max-height:80vh;
    overflow:hidden; box-shadow:0 20px 60px rgba(30,40,60,.35); display:flex; flex-direction:column;
    animation:pop .16s ease;
  }
  @keyframes pop{from{transform:scale(.94); opacity:0;} to{transform:scale(1); opacity:1;}}
  .modal-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 22px; border-bottom:1px solid var(--line);
  }
  .modal-head .m-name{font-size:24px; font-weight:800;}
  .modal-head .m-fac{font-size:14px; color:#fff; padding:4px 14px; border-radius:16px; margin-left:12px; font-weight:700; letter-spacing:1px;}
  .modal-head .m-close{
    border:none; background:#eef2f7; color:var(--sub); width:34px; height:34px; border-radius:50%;
    font-size:20px; cursor:pointer; line-height:1;
  }
  .modal-head .m-close:hover{background:#e0e6ef; color:var(--ink);}
  .modal-body{
    padding:20px 22px; overflow-y:auto; white-space:pre-line;
    font-size:15px; line-height:1.85; color:#3a4658;
  }
  footer{text-align:center; color:var(--sub); font-size:12px; padding:20px;}
</style>
</head>
<body>
<header>
  <div class="brand">三国杀武将强度投票箱 <small>国战</small></div>
  <nav><button id="navBtn" onclick="toggleView()">总数据</button></nav>
</header>
<div class="wrap">
  <section class="vote-panel" id="votePanel">
    <div class="vote-head">
      <h1>三国杀武将强度投票箱</h1>
      <p>随机对决 · 点击你认为更强的一方</p>
      <div class="criteria">请<b>仅评价该武将的单将强度</b>，综合考量其<b>与其他武将的配合能力、残局能力、输出能力、控场能力</b>等维度进行选择。</div>
      <div class="counter">已投票 <b id="voteCount">0</b> 次 · 共 <b id="genTotal">0</b> 名武将</div>
    </div>
    <div class="arena">
      <div class="pick" id="pickA" onclick="vote(0)">
        <span class="faction" id="facA"></span>
        <span class="name" id="nameA"></span>
        <div class="desc" id="descA"></div>
        <span class="hint">点击选择</span>
      </div>
      <div class="vs">VS</div>
      <div class="pick" id="pickB" onclick="vote(1)">
        <span class="faction" id="facB"></span>
        <span class="name" id="nameB"></span>
        <div class="desc" id="descB"></div>
        <span class="hint">点击选择</span>
      </div>
    </div>
    <div class="skipbar"><button onclick="nextPair()">跳过这一对 →</button></div>
  </section>
  <section class="stats-panel" id="statsPanel">
    <div class="stats-head">
      <h2>国战总数据</h2>
      <div class="stats-tools">
        <label>分层数 <input type="number" id="tierCount" value="9" min="3" max="9" onchange="renderStats()"></label>
        <button onclick="exportCSV()">导出 CSV</button>
        <button onclick="resetData()" style="background:#c8514e;">清空数据</button>
      </div>
    </div>
    <div id="statsBody"></div>
  </section>
</div>
<div class="modal-mask" id="skillMask" onclick="if(event.target===this)closeSkill()">
  <div class="modal-box">
    <div class="modal-head">
      <div><span class="m-name" id="mName"></span><span class="m-fac" id="mFac"></span></div>
      <button class="m-close" onclick="closeSkill()">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>
<footer>数据仅保存在本地浏览器（localStorage）· 胜率 = 得票次数 / 出场次数 · 势力为"隐"的武将不参与</footer>
<script>
const GENERALS = [["张春华","魏","〖果决〗当你首次明置此武将牌后，对一名其他角色造成1点且伤害。当你令其他角色进入濒死状态时，你可弃置其一张牌。\n〖傷逝〗当你受到1点伤害后，你可以弃一张牌，或将X张手牌交给一名其他角色，然后你摸X张牌（X为你已损失体力值）。"],["曹植（旧）","魏","〖落英〗每当其他角色的梅花牌因弃置而进入弃牌堆时，你可以获得之。\n〖酒诗〗转换技，①你可叠置武将牌视为使用【酒】；②当你成为锦囊牌的目标后，你可以复原武将牌。"],["嵇康（旧）","魏","〖清弦〗每当你体力值增加或减少1点后，你可以将一名角色区域内的一张牌移至其上家或下家的对应区域。\n〖绝响〗你死亡时，你可以弃置任意张场上或你手牌中的梅花牌，然后发动等量次“清弦”。"],["杨修","魏","〖啖酪〗当你成为锦囊牌的目标后，若你不是此牌的唯一目标，你可以摸一张牌，然后此牌对你无效。\n〖鷄肋〗当你受到伤害后，你可以声明一种牌的类别，本回合伤害来源不能使用、打出或弃置你声明的此类手牌。"],["曹仁A","魏","〖据守〗：结束阶段，你可以摸X张牌(X为场上势力数)然后弃置一张手牌，若以此法弃置的牌为装备牌，则改为你使用之。若X大于2，则你将武将牌叠置。\n〖解围〗：你可以将装备区里的一张牌当【无懈可击】使用。当你复原武将牌时，你可以使用1张手牌（目标须合法）或令一名势力与你相同的角色摸1张牌。"],["荀彧","魏","〖驱虎〗：出牌阶段限一次，你可以与一名体力值大于你的角色拼点。若你：赢，其对其攻击范围内你指定的另一名角色造成1点伤害；没赢，其对你造成1点伤害。\n〖节命〗：当你受到1点伤害或死亡时，你可以令一名角色摸两张牌，然后若其手牌数小于其体力上限，你摸一张牌。"],["许褚","魏","〖裸衣〗：摸牌阶段结束时，你可以弃置一张牌，然后亮出牌堆顶的三张牌，获得其中的基本牌、武器牌和【决斗】。若如此做，本回合你为伤害来源的【杀】或【决斗】造成的基础伤害值+1。\n〖挟缠〗：限定技，出牌阶段，你可以与一名角色拼点。若你赢，你视为对其使用一张【决斗】；若你没赢，其视为对你使用一张【决斗】。"],["贾诩","魏","〖缜略〗：锁定技，你使用的普通锦囊牌不能被【无懈可击】响应；当你成为延时锦囊牌的目标时，取消之。\n〖间书〗：出牌阶段限一次，你可以将一张黑色手牌交给一名其他角色A，并选择另一名其他角色B，然后令A与B角色拼点：赢的角色弃置两张牌，没赢的角色失去1点体力。\n〖拥嫡〗：限定技，出牌阶段或当你受到伤害后，你可以令一名其他男性角色加1点体力上限并回复1点体力，然后你令其获得〖颂威〗。\n〖颂威〗：其他势力相同的角色的黑色判定牌生效后，其可以令你摸一张牌。"],["蔡文姬","魏","〖陈情〗：每轮限一次，当一名角色进入濒死状态时，你可以令另一名其他角色摸四张牌，然后弃置四张牌，若其以此法弃置的四张牌花色各不相同，其视为对濒死状态的角色使用一张【桃】。\n〖默识〗：结束阶段，你可以将一张手牌当你本回合出牌阶段使用过的第一张基本牌或普通锦囊牌使用，然后你可以将一张手牌当你本回合出牌阶段使用过的第二张基本牌或普通锦囊牌使用。"],["臧霸（旧）","魏","〖横江〗：当你受到伤害后，你可以令当前回合角色本回合的手牌上限—X（X为其装备区里的牌数且至少为1），本回合结束时若其未于本回合的弃牌阶段弃置过其手牌，你将手牌摸至体力上限。"],["曹昂","魏","〖慷忾〗：当一名角色成为【杀】的目标后，若其与你势力相同或你与其距离1以内，则你可以摸一张牌，然后交给其一张牌并展示之。若此牌为装备牌，该角色可以使用此牌。"],["曹彰","魏","〖将驰〗：出牌阶段开始时，你可以选择一项：1.摸两张牌，此阶段不能使用或打出【杀】；2.摸一张牌；3.弃置一张牌，此阶段使用【杀】无距离限制且可以多使用一张【杀】。"],["李典","魏","〖恂恂〗：摸牌阶段开始时，你可以观看牌堆顶的四张牌，将其中两张牌以任意顺序置于牌堆顶，其余以任意顺序置于牌堆底。\n〖忘隙〗：当你对其他角色造成1点伤害后，或当你受到其他角色造成的1点伤害后，你可以摸两张牌并将其中一张牌交给其。"],["典韦","魏","〖捐甲〗：锁定技，你的防具栏不能置入防具（已有防具则弃置）；当你首次明置此武将牌时，你获得一个额外的武器栏。\n〖挈挟〗：锁定技，准备阶段，你在剩余武将牌堆中随机观看五张武将牌，然后选择其中任意张当武器牌置于你的装备区中（离开你的装备区时销毁），此类武器牌拥有如下规则：1.无花色点数且攻击范围为牌上单独的阴阳鱼个数；2.武器效果为你选择一个除限定技外，牌上描述中含有“【杀】”的技能。\n〖强袭〗：出牌阶段限一次，你可以失去1点体力，对你攻击范围内的一名其他角色造成1点伤害。"],["郭淮","魏","〖断势〗：主将技，你体力上限为1.5☯。锁定技，一名角色因杀死其他角色执行奖惩而摸牌时，其少摸一张牌（至少为一），然后你摸一张牌。\n〖精策〗：当你于出牌阶段内第一次使用够X张花色牌后(X为你的体力值)，你可以摸等量的牌；回合结束时，若本回合弃牌数不小于X，你可以执行一个额外的摸牌阶段。若你本回合使用过的牌数不小于X，你可以执行一个额外的出牌阶段。"],["陈群（旧）","魏","〖定品〗出牌阶段每类别限一次，你可以弃置一张牌并令未选择过的一名其他角色摸/弃置X张牌（X为发动次数）。若其已受伤，则你横置武将牌。\n〖法恩〗当一名角色横置武将牌或叠置武将牌后，你可以令你或其摸一张牌。"],["程昱","魏","〖设伏〗：回合内限一次，你可以将一张非装备类手牌扣置于武将牌上，称为“伏兵”；其他角色于你回合外使用牌时，你可以移去一张记录牌名相同的“伏兵”并取消之，然后你可以再扣置一张不同牌名的“伏兵”。\n〖贲育〗：当你受到伤害后，若你的手牌数：小于X，你可以摸牌至X张(至多摸至五张)；等于X，你令来源其中一个武将技能失效直到你下回合开始；大于X，你可以弃置至少X+1张手牌，然后对来源造成1点伤害(X为来源手牌数)。"],["夏侯渊","魏","〖神速〗：你可以做出如下选择：1.跳过判定阶段和摸牌阶段；2.跳过出牌阶段并弃置一张装备牌；3.跳过弃牌阶段并失去1点体力。你每选择一项，便视为你使用一张无距离限制的【杀】。\n〖整辎〗：回合结束时，若你于本回合造成了大于等于x点伤害（x为你的体力值），你可以摸两张牌。"],["郝昭（旧）","魏","【镇骨】：你的回合内，你可以在对应的时机发动下列一项，或者弃置装备区里的所有牌执行两项：\n1.弃牌阶段开始时，你令一名其他角色将手牌数弃置至你的体力值，然后你弃置X张牌（X为其以此法弃置的牌数，不足则全弃）。\n2.结束阶段，你令一名角色摸X张牌（X为你已损失体力值）。"],["于禁","魏","【节钺】：准备阶段，你可以交给一名与你势力不同的角色一张手牌，然后令其执行一次“军令”。若其执行，你摸一张牌；若其不执行，你本回合的摸牌阶段多摸三张牌。\n【毅重】：锁定技，当你成为一名角色使用黑色【杀】的目标后，该角色选择一项：1.弃置一张牌；2.令此【杀】对你无效。"],["曹丕","魏","〖争嗣〗：出牌阶段，你可以选择包含你在内三名有手牌的角色，令其中一名角色先展示一张手牌，其余角色再同时展示一张手牌：点数最大的角色弃置两张手牌；点数最小的角色失去1点体力。\n〖承命〗：出牌阶段结束时，若你是本阶段〖争嗣〗角色中手牌数最大的，你可以回复1点体力；体力值最大的，你可以获得这些角色各一张牌。\n[行殇]：当其他角色死亡时，你可以选择一项：1.获得其所有牌；2.回复1点体力。"],["曹操","魏","〖奸雄〗：当你受到伤害后，你可以获得对你造成伤害的牌，并摸一张牌。\n〖清正〗：出牌阶段开始时，你可以展示所有手牌，弃置手牌中一种花色的所有牌，然后观看一名有手牌的其他角色的手牌，弃置其手牌中与你弃置的相同花色的所有牌。"],["夏侯惇","魏","〖刚烈〗：当你受到1点伤害后，你可以进行判定，若结果为：红色，你对伤害来源造成1点伤害；黑色，你弃置其一张牌。\n〖清俭〗：每回合限一次，当你于你摸牌阶段外获得牌后，你可展示任意张牌并交给一名其他角色，你给出的牌中每有一种类别，当前回合角色本回合的手牌上限+1。"],["邓艾","魏","〖屯田〗：当你于回合外失去牌后，你可以进行判定，若结果为红桃，则你可以弃一张牌，视为使用此红桃牌（你以此法弃置牌不触发〖屯田〗效果）；否则你将此判定牌置于你的武将牌上，称为“田”。你计算与其他角色的距离-X（X为“田”的数量）。\n〖急袭〗：主将技，你体力上限为1.5☯。你可以将一张“田”当【顺手牵羊】使用。\n〖解腕〗：一名角色的准备阶段限一次，你可以移去两张“田”，然后将一张手牌当距离限制为X的【顺手牵羊】使用（X为“田”的数量且至少为1）。"],["甄姬","魏","〖洛神〗：你的回合内限一次，当你失去最后的红色手牌后，你可以亮出牌堆顶的一张牌，若此牌为：红色，你获得此牌；黑色，你可以重复此流程，然后获得所有的黑色判定牌。\n〖倾国〗：出牌阶段限一次，你可以将任意张红色手牌交给其他角色；你可以将一张黑色牌当【闪】使用或打出。"],["郭嘉","魏","〖天妒〗：当你的判定牌生效后，你可以获得此牌。\n〖先谋〗：转换技，当你首次明置此武将牌时，你可以选择此技能的状态。出牌阶段开始时，①你可以弃置两张手牌，然后视为使用一张普通锦囊牌（目标需合法）；②你进行判定，若你本局游戏发动此技能弃置过与结果花色相同的牌，你受到1点无来源伤害。\n〖遗计〗：当你受到1点伤害后，你可以摸两张牌，然后可以将至多两张手牌交给其他角色。"],["司马懿","魏","权变：当你于出牌阶段内第一次使用每种花色的手牌时，你可以摸一张牌，然后令你此阶段不能再使用此花色的手牌，并观看牌堆顶的X张牌，将这些牌以任意顺序置于牌堆顶或牌堆底。（X为你的体力上限）\n〖雄志〗：限定技，出牌阶段，你可以观看牌堆顶的牌，然后你可以使用之并重复此流程，直到牌堆顶的牌不能被使用或亮出牌数达到场上存活角色数。（使用【杀】有次数限制）。\n〖反馈〗：当你受到1点伤害后，你可以获得伤害来源的一张牌。"],["朱灵","魏","〖急陷〗：摸牌阶段结束时，你可以视为对符合以下任意条件的一名其他角色使用一张【杀】并摸X张牌（X为其符合的条件数）：1.装备区里有防具牌；2.体力值大于你；3.手牌数大于你。然后若此【杀】未造成伤害，其对你造成1点伤害。\n〖决绝〗：弃牌阶段开始时，你可以对自己造成1点伤害，然后此阶段结束时，若你弃置过手牌，其他角色各选择一项：1.弃X张手牌（X为你此阶段弃牌数）；2.你对其造成1点伤害。你杀死与你势力相同的角色不执行奖惩。"],["乐进","魏","〖陷坚〗：当你使用非转化且非虚拟的【杀】指定一名角色为唯一目标后，你将此【杀】置入其装备区，称为“陷坚”牌（优先置入空的装备栏，装备栏均有牌则改为替换原装备），然后你可以摸X张牌（X为其装备区里的牌数，至少为1至多为3）。\n〖折锐〗：当一名角色失去装备区里的“陷坚”牌后，你摸一张牌。"],["曹仁B","魏","〖阴锋〗：出牌阶段限一次，你可以对自己造成1点伤害，然后你选择一名有手牌的其他角色并观看其手牌，若其手牌中：没有【闪】，你视为对其使用一张【杀】，且本回合你计算与其的距离视为1；有【闪】，你获得其1张手牌。\n〖镇戍〗：结束阶段，你可以弃一张牌并令任意名已受伤的角色各摸一张牌（若你弃的是装备牌，你可以改为使用这张牌），然后你摸X张牌( X为你选择的角色数)；你可以将装备区的牌当【无懈可击】使用。"],["曹植","魏","〖落英〗：当其他角色的一张梅花牌因弃置或判定而置入弃牌堆后，你可以获得之。\n〖酒诗〗转换技，你可以摸一张牌，然后①你可叠置武将牌视为使用【酒】；②当你成为锦囊牌的目标后，你可以复原武将牌。"],["荀攸","魏","〖奇策〗：出牌阶段限一次，你可以将所有手牌当一张目标数不大于X的普通锦囊牌使用（X为你的手牌数），然后可以变更副将。\n〖智愚〗：当你受到1点伤害后，你可以摸一张牌，然后展示所有手牌且伤害来源弃置一张手牌。若颜色均相同，你获得弃置的牌且下回合〖奇策〗发动次数+1。"],["曹婴","魏","〖凌人〗：每回合限一次，当你使用【杀】或伤害类锦囊牌指定目标后，你可以猜测其中一名目标角色的手牌中是否有基本牌、锦囊牌或装备牌，然后其展示所有手牌。若你猜对：至少一项，此牌对其造成的伤害+1；至少两项，你摸两张牌；三项，你获得〖奸雄〗和〖行殇〗直到你的下回合开始。\n〖伏间〗：锁定技，准备阶段或结束阶段，你观看一名手牌数最小的其他角色的手牌。\n〖奸雄〗：当你受到伤害后，你可以获得对你造成伤害的牌并摸一张牌。\n〖行殇〗：当其他角色死亡时，你可以选择一项：1.获得其所有牌；2.回复1点体力。"],["张星彩","蜀","〖甚贤〗每名其他角色的回合限一次，当其他角色因弃置而失去基本牌后，你可以摸一张牌。\n〖枪舞〗出牌阶段限一次，你可以进行判定，然后直到回合结束，你使用点数小于判定结果的【杀】无距离限制，且你使用点数大于判定结果的【杀】无次数限制。"],["甘夫人（旧）","蜀","〖淑慎〗：当你回复1点体力后，你可以令一名其他角色摸一张牌，若其没有手牌，则改为摸两张牌。\n〖神智〗：准备阶段，你可以弃置所有手牌，若你以此法弃置的手牌数不小于X，你回复1点体力（X为你当前的体力值）。"],["马云禄","蜀","〖马术〗锁定技，你计算与其他角色的距离-1。\n〖凤魄〗当你于回合内使用第一张【杀】或【决斗】指定唯一目标后，你可以展示其至多两张手牌，弃置其中的方块牌，每弃一张方块，此牌造成的伤害+1。若你以此法弃置过其他角色牌且此牌造成伤害，你摸两张牌。"],["张飞","蜀","〖咆哮〗：锁定技，你使用【杀】无次数限制。你在一回合内使用第二张【杀】时，摸一张牌。\n〖暴喝〗：一名角色出牌阶段结束时，你可以弃置两张牌，然后你视为使用一张无距离限制的【杀】。"],["祝融","蜀","〖巨象〗：锁定技，【南蛮入侵】对你无效；当其他角色使用的【南蛮入侵】结算结束后，你获得之。\n〖烈刃〗：当你使用【杀】指定一个目标后，你可以与其拼点，若你赢，你获得其一张牌；若你没赢，你获得其拼点的牌，其获得你拼点的牌。"],["丞相诸葛亮","蜀","〖观星〗：准备阶段，你可以观看牌堆顶的五张牌（若存活角色数小于4则改为三张），然后将这些牌以任意顺序置于牌堆顶或牌堆底。\n〖空城〗：锁定技，若你没有手牌：1.当你成为【杀】或【决斗】的目标时，取消之；2.你的回合外，其他角色交给你的牌置于你的武将牌上，摸牌阶段开始时，你获得这些牌。"],["王平","蜀","〖飞军〗：出牌阶段限一次，你可以弃置一张牌，然后令一名手牌数大于你的角色交给你一张牌。\n〖将略〗：限定技，出牌阶段，你可以选择一个“军令”，与你势力相同的其他角色均可以执行该“军令”（未确定势力的角色可以在此时明置武将牌），你和所有执行“军令”的角色各加1点体力上限并回复1点体力，然后你摸X张牌（X为因此回复体力的角色数）。"],["张嶷（旧）","蜀","〖怃戎〗出牌阶段限一次，你可以与一名其他角色各展示一张手牌，若【杀】对非【闪】/非【杀】对【闪】，则你弃置双方展示的牌，对其造成1点伤害/获得其一张牌。\n〖矢志〗若你的体力值为1，与你势力的角色可以将你的一张手牌当【杀】使用或打出。"],["庞统（旧）","蜀","〖鸿图〗：出牌阶段限一次，你可以摸三张牌，展示三张点数各不同的手牌，令一名其他角色选择获得并使用其中一张牌。若获得牌点数为三张牌中的：大，其将此牌当【杀】使用（目标需合法，若不使用本回合结束后变回原牌）；中，你与其各摸一张牌；小，其手牌上限+2至其下个回合结束。若其未以此法使用牌，你可弃置一张展示牌，对其造成1点火焰伤害。\n〖涅槃〗：限定技，出牌阶段或当你处于濒死状态时，你可以弃置区域里的所有牌，复原武将牌，然后摸三张牌并将体力回复至3点。"],["杨婉","蜀","〖诱言〗：你的回合内限一次，当你的牌因弃置进入弃牌堆时，你可以亮出牌堆顶的四张牌，然后获得其中与你本次弃置的牌花色均不相同的牌。\n〖追还〗：回合结束时，你可以选择至多两名角色，直到你下回合开始：其中一名角色下一次受到伤害后，其对伤害来源造成1点伤害；另一名角色下一次受到伤害后，伤害来源弃置两张手牌。（同一名角色不能连续选择相同的效果）"],["马忠","蜀","〖抚蛮〗与你势力相同的角色可以将你的两张牌当作【杀】使用或打出，且其摸一张牌，交给你一张牌。"],["卧龙凤雏","蜀","【游龙】:转换技，当你首次明置此武将牌时，你可以选择此技能的状态。出牌阶段限一次，你可以弃置你装备区里的一张牌，选择一项：①视为使用一张本回合未使用过的普通锦囊牌；②视为使用一张本回合未使用过的基本牌。\n〖问天〗：你可以将牌堆顶的一张牌当【无懈可击】/【火攻】使用，若此牌为红色/黑色，此技能于本轮内失效。\n【鸿图】:出牌阶段限一次，你摸三张牌，展示三张点数各不同的手牌，令一名其他角色选择获得并使用其中一张牌。若其获得牌点数为：大，其摸1张牌；中，其重铸1张其他手牌；小，其手牌上限+2至其下个回合结束。此牌结算后你弃置剩余的展示牌。"],["甘夫人糜夫人","蜀","【婵娟】：出牌阶段每种牌名限一次，当你使用仅指定一个目标的基本牌或普通锦囊牌结算结束后，你可以将1张手牌当此牌使用，若目标与之前相同，你摸一张牌。\n【殉别】：副将技，当你进入濒死状态时，你可以将体力回复至1点并摸1张牌，然后更换副将。"],["吴懿（旧）","蜀","【奔袭】：锁定技，当你于回合内使用牌时，本回合你计算与其他角色的距离-1；你的回合内，若你与所有其他角色的距离均为1，则你使用仅指定一个目标的【杀】或伤害类锦囊牌时，选择一项：1.此牌目标+1；2.此牌造成伤害后，摸一张牌；3.此牌无视防具。"],["廖化（旧）","蜀","〖当先〗：锁定技，当你首次明置此武将牌后，你获得1枚“先驱”；回合开始时，你摸一张牌并执行一个额外的出牌阶段。"],["刘备","蜀","〖仁德〗：出牌阶段每名角色限一次，你可以将任意张手牌交给一名其他角色，每阶段你以此法给出第二张牌时，你可以视为使用一张基本牌（以此法使用的【杀】有距离限制且计入次数限制）。\n〖夷临〗：每回合每名角色限一次，当你获得其他角色的牌后，或当其他角色获得你的牌后，你可以令获得牌的角色选择是否使用其中一张牌。"],["刘禅","蜀","〖享乐〗：锁定技，当你成为一名角色使用【杀】的目标后，该角色选择一项：1.弃置一张基本牌；2.令此【杀】对你无效。\n〖放权〗：你可以跳过出牌阶段，令你本回合的手牌上限等于体力上限。若如此做，本回合结束时，你可以弃置一张手牌，令一名其他角色执行一个额外的回合。"],["马谡","蜀","〖散谣〗：出牌阶段限一次，你可以弃置任意张牌，然后对等量名除你外体力值最大的角色各造成1点伤害。\n〖制蛮〗：当你对其他角色造成伤害时，你可以防止此伤害，然后获得其装备区或判定区里的一张牌。若其与你势力相同，你可以令其选择是否变更副将。\n〖挥泪〗：锁定技，当你死亡时，杀死你的角色弃置所有牌。"],["诸葛瞻","蜀","〖罪论〗：结束阶段，你可以观看牌堆顶三张牌，你每满足以下一项便获得其中的一张，然后将其余牌以任意顺序置于牌堆顶：1.本回合造成过伤害；2.本回合未弃置过牌；3.手牌数为全场最少。若均不满足，你与一名其他角色各失去1点体力。\n〖父荫〗：锁定技，当你每回合第一次成为【杀】或【决斗】的目标后，若你的手牌数不大于使用者，此牌对你无效。"],["孟获","蜀","〖祸首〗：锁定技，【南蛮入侵】对你无效；你是所有【南蛮入侵】的伤害的来源；当你首次明置此武将牌时，视为使用一张【南蛮入侵】。\n〖再起〗：弃牌阶段结束时，你可以令至多X名角色各选择一项：1.其摸一张牌，然后交给你一张牌；2.令你回复1点体力（X为本回合你弃置的红色牌数）。"],["傅佥","蜀","絕途：锁定技，结束阶段，你摸牌至体力上限(至多摸至五张)，然后全场进入鏖战状态；已进入则改为你视为使用一张【决斗】。\n〖绝勇〗：锁定技，鏖战状态，当你成为其他角色使用的转化、虚拟牌的目标时，取消之。"],["严颜","蜀","转换技，当你首次明置此武将牌时，你可以选择此技能的状态。①你或此状态下第三次有角色成为【杀】的目标后，你可以与此【杀】使用者各摸x张牌（不对其使用则重置次数），然后若其武将牌均明置，你可以暗置其一张武将牌，本回合不能再明置。②你或此状态下第三次有角色使用【杀】指定目标后，你可以获得此【杀】目标X张牌（X为者此【杀】使用者已损失的体力值且至少为1）（不对其使用则重置次数），然后若你武将牌均明置，其可以暗置此武将牌，本回合不能再明置。"],["徐庶","蜀","〖谦策〗：与你势力相同的角色使用锦囊牌指定目标后你可以令目标中的大势力角色不能响应此牌。\n〖剑歌〗：主将技，你体力上限为2☯，每回合限一次，你可以将一张非基本牌当【杀】使用或打出。若此时为你的回合外，你摸一张牌。\n〖荐才〗：副将技，锁定技，你体力上限为1.5☯。与你势力相同的角色进入濒死状态时，你令其回复体力至1点，然后你变更一次副将。"],["石韬","蜀","〖剑舞〗：你可以将一张非基本牌当作【杀】使用或打出。\n〖逐鹄〗：锁定技，与你势力相同的角色变更副将或死亡后，若此牌不为副将，须调整为副将；若为副将，则重置武将牌。然后你变更副将。\n〖潜学〗：主将技，你体力上限为1.5☯。你每有一个区域失去过所有牌，回合结束时你可从弃牌堆中获得一张本回合进入弃牌堆的牌，且须优先选择非基本牌。"],["潘璋＆马忠","吴","〖夺刀〗当你抵消其他角色使用的【杀】后，你可以获得此【杀】或其武器牌。\n〖暗箭〗当你使用【杀】时，若有目标攻击范围内没有你，则你可以令此【杀】不可被响应或伤害+1。"],["朱然","吴","〖胆守〗当你成为其他角色使用【杀】的目标后，你可以令此牌无效，然后其视为对你使用【决斗】，且你或其因响应此牌而失去最后的手牌后摸一张牌。"],["徐盛","吴","〖疑城〗：当你和与你势力相同的角色使用【杀】指定目标后或成为【杀】的目标后，该角色可以摸一张牌然后弃置一张牌。若弃置装备牌，你弃置一名角色一张牌；若弃置锦囊牌，你摸一张牌。"],["孙策","吴","〖激昂〗：当你使用【决斗】或红色【杀】指定目标后，或成为【决斗】或红色【杀】的目标后，你摸一张牌。\n〖激霸〗：当你使用【决斗】时，你可以失去1点体力，额外选择一个目标；出牌阶段限一次，你可以将所有手牌当【决斗】使用。\n〖魂殇〗：若你已受伤，你本回合获得〖英姿〗；体力值为1或者没有手牌时，你本回合获得〖英魂〗。"],["陆逊","吴","〖谦逊〗：锁定技，当你成为【顺手牵羊】或【乐不思蜀】的目标时，取消之。\n〖连营〗：当你失去手牌后，若你没有手牌，你可以令至多X名角色各摸一张牌（X为你此次失去的手牌数）。\n〖度势〗：出牌阶段开始时，你可以弃置1张红色手牌，视为使用一张【以逸待劳】。"],["吕蒙","吴","〖克己〗：锁定技，弃牌阶段开始时，若你未于出牌阶段内使用过颜色不同的牌，本回合你的手牌上限+4。\n〖谋断〗：结束阶段，若你于出牌阶段内：1.使用过四种花色，你可以获得一个额外回合；2.使用过三种类别的牌，你可以移动场上的一张牌。"],["吴景","吴","〖合击〗：当一名角色使用仅指定唯一目标的【决斗】或红色【杀】结算结束后，你可以从手牌中对相同目标使用一张【杀】或【决斗】，你以此法使用非转化牌时，摸一张牌。\n〖流兵〗：锁定技，你每回合使用的第一张非虚拟【杀】的花色视为方块。其他角色于其出牌阶段内使用的非黑色【杀】进入弃牌堆后，若此【杀】未造成伤害，你获得之。"],["韩当","吴","〖弓骑〗：与你势力相同的角色出牌阶段限一次，其可以弃置你一张牌，令其攻击距离无限，若为装备牌，你可以弃置其他角色一张牌。\n〖解烦〗：限定技，出牌阶段，你可以选择一名角色，然后令攻击范围内含有该角色的所有角色各选择一项：1.弃置一张武器牌；2.令其摸一张牌。"],["程普","吴","〖疠火〗：当你使用普通【杀】时，你可以将此【杀】改为火【杀】，然后此【杀】结算结束后，若此【杀】造成过伤害，你失去1点体力；你使用火【杀】可以多指定一个目标。\n〖醇醪〗：出牌阶段结束时，若你的武将牌上没有“醇”，你可以将任意张【杀】置于你的武将牌上，称为“醇”（“醇”的上限为3）；当一名角色处于濒死状态时，你可以移去一张“醇”，令其视为使用一张【酒】，然后若你移去的“醇”为：雷【杀】，你摸两张牌；火【杀】，你回复1点体力。"],["周泰","吴","〖不屈〗：锁定技，当你非因〖不屈〗进入濒死状态时，你将体力回复至1点并重置〖奋激〗，然后将牌堆顶的一张牌置于你的武将牌上，称为“创”，若与另一张“创”点数相同，移去此“创”；当你移去“创”时，你失去等量的体力。\n〖奋激〗：每回合每名角色限一次，当一名角色非因使用或打出而失去手牌后，你可以失去1点体力，然后失去手牌的角色摸两张牌。"],["凌统","吴","〖旋略〗：当你于弃牌阶段弃置过至少两张牌，或当你失去装备区里的牌后，你可以弃置一名其他角色的一张牌。\n〖勇进〗：限定技，出牌阶段，你可以移动场上的至多三张装备牌。（同一张装备只能移动一次）"],["黄盖","吴","〖苦肉〗：出牌阶段限一次，你可以弃置一张牌，然后失去1点体力。\n〖诈降〗：锁定技，当你失去1点体力后，你摸三张牌，然后若此时为你的出牌阶段内，则此阶段你使用【杀】的次数上限+1、使用非转化的红色【杀】无距离限制。"],["大乔小乔","吴","【流离】：当你成为【杀】的目标时，你可以弃置一张牌并将此【杀】转移给你攻击范围内的一名其他角色（不能是使用此【杀】的角色）。\n【天香】：每回合每项限一次，当你受到伤害时，你可以弃置1张红色手牌并选择一名其他角色，然后防止此伤害并选择一项：1.来源对其造成1点伤害，然后其X张牌（X为其已损失的体力值目至多为5）；2.令其失去1点体力，然后其获得你弃置的牌。\n【娉婷】：锁定技，若你的装备区里有红色牌，你的手牌上限+1。"],["周处","吴","【乡害】：锁定技，其他角色手牌上限-1；若你于出牌阶段内使用或打出过牌，回合结束时，你流失1点体力。\n【除害】：你的回合内，若你使用过X种不同类型的牌，则你获得【彰名】，失去【乡害】，回复1点体力（X为你当前体力值）。\n【彰名】：锁定技，你使用梅花牌不能被响应；每回合限一次，当你对其他角色造成伤害后，你摸1张牌并展示之，本回合因【彰名】获得的牌不计入本回合手牌上限，然后其弃置一张手牌。"],["步练师","吴","【安恤】：出牌阶段限一次，你可以选择两名手牌数不同的其他角色，令其中手牌少的角色获得手牌多的角色一张手牌并展示之，若此牌不为黑桃，你摸一张牌；若这两名角色手牌数相等，你回复1点体力。\n【追忆】：当你死亡时，你可以令一名其他角色（杀死你的角色除外）摸三张牌并回复1点体力，然后其可以选择变更一次副将。"],["孙权","吴","〖制衡〗：出牌阶段限一次，你可以弃置至多X张牌（X为你的体力上限），然后摸等量的牌。你每因此弃置了一个区域的所有牌，便多摸一张牌。\n〖嘉禾〗：每名吴势力角色的准备阶段，其可以将一张装备牌置于你的装备区（替换原装备，若为你，则改为弃置一张手牌），然后其可以获得〖英姿〗〖好施〗〖涉猎〗〖度势〗其中一个技能直到回合结束。\n〖英姿〗：锁定技，摸牌阶段，你多摸一张牌；你的手牌上限等于你的体力上限。\n〖好施〗：摸牌阶段，你可以多摸两张牌，然后摸牌阶段结束时，若你的手牌数大于5，你将一半的手牌（向下取整）交给一名手牌最少的其他角色。\n〖涉猎〗：摸牌阶段，你可以改为亮出牌堆顶的五张牌，然后获得其中每种花色的牌各一张。\n〖度势〗：出牌阶段开始时，你可以弃置1张红色手牌，视为使用一张【以逸待劳】。"],["诸葛瑾","吴","〖缓释〗：当一名角色的判定牌生效前，若你的手牌数大于体力值时，你可以用一张手牌替换判定牌；若你的手牌数小于等于体力值时，你可以观看牌堆顶的一张牌，然后可以选择一项：1.用此牌代替判定牌；2.用一张手牌替换判定牌。\n〖弘援〗：每回合限两次，当你一次获得至少两张牌后，你可以令一名角色摸一张牌；当一名其他角色一次失去至少两张牌后，你可以令其摸一张牌。\n〖明哲〗：锁定技，当你于回合外失去红色牌后，你展示之并摸一张牌。"],["周瑜","吴","〖英姿〗：锁定技，摸牌阶段，你多摸一张牌；你的手牌上限等于你的体力上限。\n〖反间〗：出牌阶段限一次，你可以令一名其他角色猜一种花色，然后获得你的一张手牌并展示之，若猜错花色，你对其造成1点伤害，若其是黄盖，其改为失去1点体力。"],["严畯","吴","〖观潮〗：出牌阶段开始时，你可以选择一项直到此阶段结束：1.当你使用牌时，若你此阶段使用过的所有牌的点数严格递增，你摸一张牌；2.当你使用牌时，若你此阶段使用过的所有牌的点数严格递减，你摸一张牌。\n〖逊贤〗：每名其他角色的回合限一次，当你使用或打出的牌置入弃牌堆时，你可以将之交给一名手牌数大于你的角色。"],["陆抗","吴","〖审断〗：当你拼点时，你可以弃置一张牌，然后你本次拼点牌的点数改为K。当有角色拼点后，你可以令本次拼点牌点数为K的角色摸一张牌。\n〖克构〗：一名角色弃牌阶段开始时，若你本回合使用或打出过牌，你可以与一名其他角色拼点，若你：赢，你获得场上一张牌；没赢，其视为对你使用一张【杀】。\n〖筑围〗：当你使用【杀】或伤害类锦囊牌拼点结束后，你可以摸一张牌，然后你可以令当前回合角色本回合手牌上限+1。"],["张昭&张纮","吴","〖直谏〗：出牌阶段，你可以将手牌中的一张装备牌置于其他角色的装备区里，然后摸一张牌；当你于出牌阶段内第一次使用该类型装备牌时，你摸一张牌。\n〖固政〗：每回合限一次，当其他角色的至少两张牌因弃置而置入弃牌堆后，你可以令其获得其中一张牌，然后你可以获得其余牌。"],["鲁肃","吴","〖好施〗：摸牌阶段，你可以多摸两张牌，然后若你的手牌数大于5，你将半数（向下取整）手牌交给手牌最少的一名其他角色。\n〖缔盟〗：出牌阶段限一次，你可以选择两名其他角色并弃置X张牌（X为这两名角色手牌数之差），令这两名角色交换手牌，你可以对其中手牌未增加的一名角色获得“好施”直至其回合结束。"],["吕岱","吴","〖勤国〗：当你于回合内使用装备牌结算结束后，你可以视为使用一张无次数限制的【杀】；当你装备区里的牌数变化后，若你装备区里的牌数等于你的体力值，你回复1点体力。"],["陈武&董袭","吴","奋命：出牌阶段各限一次，你可以：1.令至多X名角色横置（X为你已损失的体力值，至少为1），然后你横置；2.若你横置，弃置所有横置的角色各一张牌。\n〖断绁〗锁定技，当你重置后，你摸一张牌，若此时是你回合内，你多摸一张牌。"],["蒋钦","吴","〖尚义〗：出牌阶段限一次，你可以令一名其他角色观看你的手牌，然后你选择一项：1.观看其手牌并可以弃置其中的一张黑色牌，然后可以视为使用一张【调虎离山】；2.观看其所有暗置的武将牌。\n〖鸟翔〗：锁定技，当你使用【杀】指定一名角色为目标后，若你在其攻击范围内，其需依次使用两张【闪】才能抵消此【杀】。"],["周鲂","吴","〖断发〗：出牌阶段，你可以弃置任意张黑色牌，然后摸等量的牌（你每阶段以此法弃置的牌数之和不能大于体力上限）。\n〖诱敌〗：结束阶段，你可以令一名其他角色弃置你一张手牌，若弃置的牌不为：【杀】，你获得其一张牌；黑色，你摸一张牌。"],["伏完","群雄","〖谋溃〗当你使用【杀】指定一个目标后，你可以摸一张牌或弃置其一张牌，其于抵消此【杀】后弃置你一张牌。\n〖沉度〗当你成为锦囊牌的目标后，你可以将一张锦囊牌弃置或交给其他角色，然后摸一张牌。"],["潘凤","群雄","〖狂斧〗出牌阶段限一次，你可以弃置场上的一张装备牌，然后视为使用一张【杀】（无视距离和次数）。若你弃置的不是你的牌且此【杀】未造成伤害，你弃置两张手牌；若你弃置的是你的牌且此【杀】造成伤害，你摸一张牌。"],["高顺（旧）","群雄","〖陷阵〗：出牌阶段限一次，你可以与一名角色拼点，若你：赢，本阶段你无视该角色的防具、对其使用牌无距离和次数限制；没赢，本阶段你不能使用【杀】、弃牌阶段开始时可以展示至多三张【杀】令这些牌此阶段不计入手牌上限。\n〖禁酒〗：锁定技，你的【酒】均视为点数为K的【杀】；其他角色于你的回合内不能使用【酒】。"],["刘协（旧）","群雄","〖天命〗当你成为【杀】的目标时，你可以弃置两张牌，摸两张牌。（少则全弃，无则不弃）\n〖密诏〗出牌阶段限一次，你可以将X张手牌交给一名其他角色（X为场上势力数），令其与另一名其他角色拼点，赢者视为对没赢者使用一张【杀】。"],["朱儁","群雄","〖摧破〗：锁定技，当你于每回合使用第X张牌时（X为此牌牌名字数），若为【杀】或伤害锦囊牌，此牌伤害+1，否则你摸一张牌。"],["于吉","群雄","〖千幻〗：当一名与你势力相同的角色受到伤害后，若你有与你武将牌上花色均不同的牌，你展示之并将此牌置于你的武将牌上，称为“千幻”牌，然后你可以摸一张牌。当一名与你势力相同的角色成为基本牌或锦囊牌的唯一目标时，你可以移去一张“千幻”牌，取消之。"],["邢道荣","群雄","〖虛獨〗：出牌阶段开始时，你可以流失1点体力，然后弃置距离1以内的每名角色各一张牌或令这些角色各摸一张牌。出牌阶段结束时，若你本回合发动过此技能且你的体力值不为最多，你可以回复1点体力或摸两张牌。"],["公孙瓒","群雄","〖义从〗：锁定技，你计算与其他角色的距离-1；若你已受伤，其他角色计算与你的距离+1。\n〖趫猛〗：当你使用的黑色【杀】指定其他角色为目标后，你可以弃置其中一个目标一张牌。若此牌为：装备牌，你获得之；锦囊牌，此牌无法被响应。"],["皇甫嵩（旧）","群雄","〖奋钺〗：出牌阶段限X次（X为场上势力数），你可以与一名角色拼点，若你赢，且你拼点的牌的点数：不大于5，你获得其一张牌；不大于9，你获得弃牌堆中的一张【杀】；不大于K，你视为对其使用一张不计入次数限制的雷【杀】。（不能连续选择同一名角色拼点）"],["华雄","群雄","〖耀武〗：锁定技，当你受到伤害时，若此牌不为红色，你摸一张牌。\n〖扬威〗：出牌阶段，你可以摸两张牌，令此技能失效直到你下回合的结束阶段，此阶段你可以多使用一张【杀】、你使用【杀】无距离限制且无视防具。"],["颜良文丑","群雄","〖绝行〗：出牌阶段限一次，你可以视为对一名其他势力或未确定势力角色使用一张【决斗】，此【决斗】：生效时，你与其将所有手牌扣置于各自的武将牌上，然后摸等同于各自体力上限的牌；结算结束后，你与其弃置以此法摸的牌，然后获得扣置于武将牌上的牌。\n〖狭勇〗：结束阶段，若你本回合使用过的【杀】或【决斗】造成过伤害，你可以摸等同于这些牌造成伤害总数的牌。"],["董承（旧）","群雄","〖承诏〗：一名角色的结束阶段，若你本回合获得过至少两张牌，你可以与一名其他角色拼点，若你赢，你视为对其使用一张无视防具的【杀】。"],["黄祖A","群雄","【袭射】：体力值小于你的角色无法响应你【袭射】使用的【杀】。其他角色的准备阶段，你可以选择一项：①你失去一点体力，弃置一名其他角色装备区里的一张牌，视为对其使用一张【杀】。②你可以弃置你装备区里的一张牌，视为对其使用一张【杀】，然后你可以重复此流程。若你以【袭射】杀死了其他角色，你获得其一张牌，此回合结束时，你可以更换副将，且变更后的副将处于暗置状态。"],["张角张梁张宝","群雄","【天公】：锁定技，回合开始时，你视为对所有角色进行一次判定，若结果为黑桃，你摸一张牌，若结果为黑桃2-9，你额外对其造成1点雷电伤害。若该角色势力与你相同，你可以对一名其他角色造成1点雷电伤害。\n【地公】：你的回合内，当你使用与上一张类别不同的非虚拟非转化牌结算结束后，你可以重铸一张牌。\n【人公】：锁定技，你的回合内，当你使用因【天公】【地公】技能摸的牌时，若此牌为伤害牌且为非转换牌，则此牌伤害+1。"],["田丰（旧）","群雄","〖死谏〗：当你失去手牌后，若你没有手牌，你可以弃置一名其他角色的一张牌。\n〖随势〗：锁定技，当其他角色进入濒死状态时，若伤害来源与你势力相同，你摸一张牌；当其他角色死亡时，若其与你势力相同，你选择一项：1.失去1点体力；2.弃置所有手牌。"],["黄祖B","群雄","〖鸱张〗：你使用伤害类牌无距离限制。当你使用手牌中除【闪电】外的伤害类牌指定目标后，你可以弃置任意张手牌，令其他角色不能使用或打出与你以此法弃置牌颜色相同的牌响应此牌。\n〖断鞅〗：每回合限一次，当你不因使用而失去手牌后，你可以将其中随机一张【杀】置于武将牌上，并于本阶段结束时使用之（无次数限制）。当你以此法造成伤害后，你可以重铸受伤角色区域里X张牌，然后摸X张牌（X至多为2）。"],["华雌","群雄","〖试药〗：一名角色出牌阶段限一次，其可以摸一张牌，然后进行判定，若结果为：黑色，其失去1点体力；红色，其可以将一张红色牌当【桃】使用；当你失去体力时，你摸一张牌。\n〖佐愈〗：每回合限一次，当其他角色回复/失去体力后，你可以无视时机对其发动一次〖毒医〗。\n〖毒医〗：出牌阶段限一次，你选择一名已受伤的其他角色，你观看其手牌，若你与其手牌中均有黑桃牌，则你弃置你与其手牌中各一张黑桃牌并与其各摸两张牌，否则你弃置一张牌，视为对其使用一张普通【杀】。"],["吕玲绮","群雄","〖神威〗：主将技，你体力上限为1.5☯。摸牌阶段，若你的手牌数为全场最多，你多摸两张牌；你的手牌上限+2。\n〖帼武〗：出牌阶段开始时，你可以展示所有手牌，若包含的类别数不小于:1种，你从弃牌堆中获得一张【杀】；2种，你本阶段使用牌无距离限制；3种，你本阶段使用【杀】的目标最多可以+2。\n〖妆戎〗：出牌阶段限一次，你可以弃置一张锦囊牌，然后你本阶段视为拥有技能【无双】。\n【无双】：锁定技，当你使用【杀】指定目标后，该角色需连续使用两张【闪】才能抵消此【杀】。当你使用或成为【决斗】目标后，除你以外的其他角色每次响应此【决斗】需连续打出两张【杀】。你使用非转化的【决斗】目标最多可以+2。"],["伏皇后","群雄","〖惴恐〗：每轮限一次，其他角色的准备阶段，若其体力值不小于你，你可以与其拼点：若你赢，本回合其只能对自己使用牌；若你没赢，你获得其拼点的牌，然后其视为对你使用一张【杀】。\n〖求援〗：当你成为【杀】的目标时，你可以令另一名其他角色需交给你一张不为【杀】的基本牌，否则也成为此【杀】的目标。"],["貂蝉","群雄","〖离间〗：出牌阶段限一次，你可以弃置一张牌并选择两名其他男性角色，然后令其中一名男性角色视为对另一名男性角色使用一张【决斗】。\n〖魅魂〗：结束阶段或当你成为【杀】的目标后，你可以令一名其他角色交给你一张你声明的颜色的牌，若其没有，你摸一张牌。"],["马腾","群雄","〖马术〗：锁定技，你计算与其他角色的距离-1。\n〖雄异〗：限定技，你的回合内，你可以令与你势力相同的所有角色各摸三张牌（未确定势力的角色可以在此时明置武将牌），若你的势力是角色最少的势力，你回复1点体力；若无其他角色响应，你额外摸两张牌。"],["田丰","群雄","執諫出牌阶段限一次，你可以令一名其他角色声明一种类别，然后你摸一张牌(若上次发动此技能也选择该角色，则多摸一张牌)，交给一张牌，若你交给其的牌与其声明的类别不同，其可以对你使用一张[杀]。\n效竭当你成为[杀]的目标后，你可以令自己不可响应，于结算后选择一项：1.视为使用你使用过的上一张普通锦囊牌：2.摸一张牌。\n〖随势〗：锁定技，当其他角色进入濒死状态/死亡时，若伤害来源/其与你势力相同，你摸一张牌/失去1点体力。"],["刘夫人","群雄","〖追妒〗：出牌阶段内限一次，当你造成伤害时，你可以令受伤角色选择一项：1.此伤害+1；2.弃置装备区里的所有牌（至少一张）；若其为女性角色，则你可以弃置一张牌，然后两项都执行。\n〖示恭〗：限定技，当你于回合外进入濒死状态时，你可以移除副将，然后令当前回合角色选择一项：1.获得你移除的副将的一个没有技能类型的技能，令你体力回复至体力上限；2.弃置X张手牌（X为其体力值），令你体力回复至1点。"],["关羽","魏/蜀","〖武圣〗：你可以将一张你的红色牌当【杀】使用或打出（方块【杀】无距离限制；红桃【杀】指定目标后，该角色不能明置武将牌直到此【杀】结算完毕）。\n〖武佑〗：蜀势力技，你体力上限为2.5☯。出牌阶段限一次，你选择一张手牌，并从牌堆顶展示五张牌，选择其中一个非装备牌，此展示牌名本回合视为你选择的手牌名且无距离和次数限制，然后将所有展示牌随机放置在牌堆底。\n〖怒斩〗：魏势力技，你体力上限为1.5☯。锁定技，你计算与其他角色的距离-1；你使用锦囊牌转化的【杀】不计入次数限制；你使用装备牌转化的【杀】造成的伤害+1。"],["姜维","魏/蜀","〖挑衅〗：出牌阶段限一次，你可以选择一名攻击范围内含有你其他角色，然后除非其对你使用一张【杀】，否则你弃置其一张牌。\n〖困奋〗：魏势力技，出牌阶段限一次，当一张牌非因使用而置入弃牌堆后，你可以摸两张牌；结束阶段，你可以失去1点体力，然后摸2张牌；当你首次进入濒死状态时，你将体力值回复至2点。\n〖九伐〗：蜀势力技，锁定技，当你使用或打出牌结算后，你将牌堆顶的一张牌置于武将牌上称为〖九伐〗牌，当〖九伐〗牌数达到9时，你亮出牌堆顶的9张牌，并获得其中与〖九伐〗牌重复点数的牌各一张，然后你将所有〖九伐〗牌和亮出的牌置入弃牌堆。"],["黄权","魏/蜀","〖点虎〗：当你首次明置此武将牌时，你选择一名其他势力角色。当与你势力相同的角色对该角色造成1点伤害后或该角色回复体力后，你摸一张牌。\n〖巧对〗：当〖点虎〗角色死亡时，若伤害来源为你且在你的回合内，你可以立即重置〖点虎〗并选择一名其他势力角色；否则你的下一个回合开始前，你重置〖点虎〗。\n〖途绝〗：限定技，当你处于濒死状态时，你可以将所有牌交给一名势力与你不同的角色，然后你回复X点体力并摸X张牌（X为你以此法交给其的牌数且至少为5）。"],["夏侯霸","魏/蜀","豹烈：锁定技，出牌阶段开始时，你选择至少X名攻击范围内含有你且与你势力不同的角色（X为你的体力值，不足则全选），这些角色依次需对你使用一张【杀】，否则你弃置其一张牌；你对体力值大于等于你的角色使用【杀】无距离和次数限制。"],["诸葛诞","魏/吴","〖功獒〗锁定技，你执行的奖惩改为对该势力所有角色造成1点伤害，若其为该势力唯一角色时，你获得一个额外的回合。\n〖举義〗主将技，锁定技，当场上所有角色已确认势力，若你为场上最后确定势力的角色或你的势力最后一名存活角色时，你将势力改为野心家并获得一枚野心家标记。其他角色死亡后，你回复1点体力并摸1张牌。"],["文鸯","魏/吴","〖却敌〗：每回合限一次，当你使用【杀】或【决斗】指定唯一目标后，你可以选择一项：1.获得其一张手牌；2.弃置一张基本牌，然后此【杀】或【决斗】伤害+1。\n〖仇决〗：锁定技，当你杀死其他角色后，你回复1点体力或者摸两张牌，然后本回合可以额外发动一次〖却敌〗。\n〖椎锋〗：魏势力技，出牌阶段限一次，你可以失去1点体力，然后视为使用一张【决斗】。当你受到此【决斗】的伤害时，你防止此伤害。\n〖冲坚〗：吴势力技，出牌阶段限一次，你可以将一张装备区里的一张牌当【酒】或任意一种【杀】使用，若你以此法使用的【杀】或【酒】【杀】造成伤害后，你获得目标装备区里的X张牌（X为此【杀】对此目标造成的伤害值）。"],["毌丘俭","魏/吴","〖征荣〗：当你本局游戏累计于出牌阶段内对其他角色使用偶数张牌后，或当你于出牌阶段内第一次造成伤害后，你可以将一名其他角色的一张牌置于你的武将牌上，称为“荣”。\n〖清侧〗：出牌阶段，若场上有牌，你可以移去一张“荣”，然后弃置场上的一张牌。\n〖扫讨〗：锁定技，若没有势力与你相同的其他角色，你造成或受到的伤害+1。你与大势力角色的距离－1。"],["唐咨","魏/吴","〖兴棹〗：锁定技，若场上有已受伤角色的势力数：不小于1，你拥有〖恂恂〗；不小于2，当你受到伤害后，你与伤害来源中手牌唯一最少的角色摸一张牌；不小于3，你的手牌上限+4；不小于4，你失去装备区里的牌后摸一张牌。\n〖恂恂〗：摸牌阶段开始时，你可以观看牌堆顶的四张牌，然后将其中的两张牌置于牌堆顶，将其余的牌置于牌堆底。"],["庞德","魏/群","〖马术〗：锁定技，你计算与其他角色的距离-1。\n〖决死〗：魏势力技，出牌阶段，你可以弃置一张【杀】并选择攻击范围内的一名其他角色，然后令该角色弃置一张牌。若该角色弃置的牌不为【杀】且其体力值不小于你，你视为对其使用一张【决斗】。\n〖鞬出〗：群势力技，当你使用【杀】指定目标后，你可以弃置该角色的一张牌，若弃置的牌：为装备牌，其不能使用【闪】；不为装备牌，其获得此【杀】。"],["徐晃","魏/群","〖截辎〗：锁定技，其它角色无法在你的回合内摸牌。\n〖断粮〗：魏势力技，你可以将一张黑色基本牌或黑色装备牌当无距离限制的【兵粮寸断】使用，然后若你以此法对距离大于2的角色使用【兵粮寸断】，你本回合不能再发动此技能。\n〖治严〗：群势力技，出牌阶段各限一次，你可以选择一项：1.将手牌摸至体力上限，然后你此阶段内不能对其他角色使用牌；2.将X张手牌交给一名其他角色（X为你的手牌数减体力值）。"],["张郃","魏/群","〖巧变〗：魏势力技，你可以弃置一张手牌跳过你的一个阶段（准备阶段和结束阶段除外），若以此法跳过摸牌阶段，你可以获得至多两名其他角色各一张手牌；若以此法跳过出牌阶段，你可以移动场上的一张牌。回合结束时，若你本回合以此法跳过了至少三个阶段，则你摸两张牌。\n〖知略〗：群势力技，准备阶段，你可以选择一项：1.移动场上一张牌，然后若此牌为：装备牌，你失去1点体力；延时锦囊牌，你本回合手牌上限-1；2.本回合你于摸牌阶段多摸一张牌，使用的第一张【杀】不计入次数且无距离限制。"],["张辽","魏/群","〖突袭〗：魏势力技，你的回合内限三次，当你不以此法获得牌后，你可以将其中任意张牌置入弃牌堆，然后获得至多等量名其他角色各一张手牌。（每名角色每个回合限一次）\n〖威风〗：群势力技，当你于出牌阶段内第一次使用【杀】或伤害类锦囊牌对其他势力的角色造成伤害结算结束后，你令目标中一名没有“惧”的其他角色获得对应牌名的“惧”。有“惧”的角色受到伤害时，弃其“惧”，然后若造成伤害的牌牌名与“惧”相同，此伤害+1；不同，你获得其一张牌。"],["鲍信","魏/群","〖募讨〗：出牌阶段限一次，你可以令一名角色展示所有手牌，令其将其中所有的【杀】依次交给由其下家开始的每一名角色，然后最后一名角色展示所有手牌并受到其造成的X点伤害（X为最后一名角色手牌中【杀】的数量且至多为2）。\n〖毅谋〗：当与你距离1以内的角色受到伤害后，你可以选择一项：1.令其获得弃牌堆中的一张【杀】；2.令其将一张手牌交给另一名角色并摸一张牌。"],["孙尚香","蜀/吴","〖结姻〗：出牌阶段限一次，你可以弃置两张手牌并选择一名已受伤的其他男性角色，然后你与其各回复1点体力。\n〖良助〗：蜀势力技，当你失去装备区里的牌后，你可以弃置其他角色的一张牌；出牌阶段限一次，你可以获得其他角色装备区里的一张牌，然后你令该角色摸两张牌。\n〖枭姬〗：吴势力技，当你失去装备区里的牌后，若当前处于你的回合内/外，你可以摸一/三张牌。"],["范疆&张达","蜀/吴","〖负山〗：出牌阶段开始时，所有其他角色依次可以交给你一张牌并令你本阶段使用【杀】的次数上限+1。回合结束时，若你以此法获得过牌，但你使用【杀】的次数未达上限且本回合未有角色死亡，则你失去1点体力，否则你将手牌摸至体力上限。"],["郝普","蜀/吴","〖镇荧〗：出牌阶段限两次，你可以与一名其他角色同时将手牌数调整至X张（X为你与其体力值最大的数），然后其中调整数多的角色视为对另一名角色使用一张【决斗】。"],["潘濬","蜀/吴","〖观微〗：每回合限一次，一名角色的出牌阶段结束时，若其此阶段使用牌数大于1且花色均相同，你可以弃置一张牌并令其执行额外的摸牌或出牌阶段(若你弃置牌也为此花色，则两阶段均执行)。\n〖公清〗：锁定技，当你造成的伤害被防止或减少前，无视之。"],["刘琦","蜀/群","〖问计〗：出牌阶段开始时，你可以令一名其他角色交给你一张牌，若其与你：势力相同或未确定势力，你本回合使用此牌无距离、次数限制且不能被响应；势力不同，你交给其一张除此牌外的牌。\n〖屯江〗：结束阶段，若你于出牌阶段内未使用牌指定过其他角色为目标，则你可以摸X张牌（X为全场势力数）。"],["吕布","蜀/群","〖利驭〗：当你使用【杀】对其他角色造成伤害后，你可以获得其区域里的一张牌并展示之，若获得的牌：不为装备牌，其摸一张牌；为装备牌，你视为对其选择的另一名角色使用一张【决斗】.\n〖无双〗：群势力技，你体力上限为2.5☯。锁定技，当你使用【杀】指定目标后，该角色需连续使用两张【闪】才能抵消此【杀】。当你使用或成为【决斗】目标后，除你以外的其他角色每次响应此【决斗】需连续打出两张【杀】；你使用非转化的【决斗】目标最多可以+2。\n〖乘虚〗：蜀势力技，你体力上限为2☯。势力与你相同的其他角色不能响应你使用的牌；出牌阶段限一次，你获得一名角色同一区域里至多两张牌，交给其等量的手牌，然后本回合其势力视为与你相同。(不能以此法触发胜利)"],["赵云","蜀/群","〖龙胆〗：你可以将一张【闪】当【杀】、【杀】当【闪】使用或打出。\n〖涯角〗：蜀势力技，当你于回合外发动〖龙胆〗使用或打出手牌时，你可以进行一次判定，若为基本牌，你可以将此牌交给一名角色。你发动〖龙胆〗时：若你的【杀】被【闪】抵消，则你可以对另一名角色造成1点伤害；若你的【闪】抵消了【杀】，则你可以令一名其他角色回复1点体力（不能是【杀】的使用者）。\n〖冲阵〗：群势力技，每回合限一次，当你发动〖龙胆〗时，你可以获得对方的一张手牌。"],["马超","蜀/群","〖马术〗：锁定技，你计算与其他角色的距离-1。\n〖铁骑〗：蜀势力技，当你使用【杀】指定一名角色为目标后，你可以进行判定，然后令其本回合一张明置的武将牌的非锁定技失效，除非其弃置与结果花色相同的一张牌，否则不能使用【闪】响应此【杀】。\n〖誓仇〗：群势力技，锁定技，〖马术〗改为你计算与体力值不大于你的角色的距离视为1。你使用【杀】可以多选择至多X名角色为目标（X为你已损失的体力值），然后当此【杀】结算结束后，若此【杀】未造成伤害，你获得之。"],["周仓","蜀/群","〖忠勇〗：当你对其他角色使用【杀】结算结束后，你可以将此【杀】或目标角色使用的【闪】交给另一名其他角色，然后若你交给其的牌为红色，其可以对你攻击范围内的一名角色使用一张【杀】。"],["苏飞","吴/群","〖联翩〗：每回合限X次（X为你的体力上限），当与你势力相同的角色于其出牌阶段内使用牌连续指定同一名角色为目标时，你可以摸一张牌，然后可以将此牌交给该角色。"],["祖郎（旧）","吴/群","〖袭军〗：每回合限一次，出牌阶段或当你受到伤害后，你可以将一张黑色牌当【杀】或【决斗】使用或打出。\n〖荣降〗：当一名势力与你相同的角色使用【决斗】或红色【杀】指定目标时，你可以弃置一张基本牌，若如此做，你为此牌多指定一个目标。"],["甘宁","吴/群","【奇袭】：吴势力技，你使用非虚拟且非转化的【过河拆桥】无法被响应；出牌阶段，你可以将1-2张黑色牌当【过河拆桥】使用，当使用两张牌转化的【过河拆桥】没有生效时，你可以对目标角色造成1点伤害。\n〖锦帆〗：群势力技，弃牌阶段开始时，你可以将任意张手牌置于武将牌上，称为“铃”（每种颜色的“铃”限一张）。你可以如手牌般使用或打出“铃”。其他角色的准备阶段，你可以使用一张“铃”（目标需合法），然后你摸一张牌。"],["太史慈","吴/群","〖天义〗：吴势力技，出牌阶段限一次，你可以与一名角色拼点：若你赢，你获得该角色的拼点牌，且在本回合结束之前，你可以多使用一张【杀】、使用【杀】无距离限制且可以多选择一个目标；若你没赢，本回合你不能使用【杀】。当你拼点时，若其势力与你不同，你可令其改为用随机一张手牌拼点。\n〖笃烈〗：群势力技，每回合限一次，当你成为其他角色使用基本牌或普通锦囊牌的目标时，你可以摸X张牌（X为你的攻击范围且至多为5），然后令此牌的效果结算两次。本轮你每发动一次此技能，攻击范围+1，最多为5：你的攻击范围始终+1；"],["孙坚","吴/群","〖破虏〗：当你杀死一名角色或死亡后，你可以令任意名角色各摸X张牌（X为你此前发动过此技能的次数+1）。\n〖英魂〗：吴势力技，你体力上限为2.5☯。准备阶段，你可以选择一名其他角色并选择一项：1.其摸X张牌，然后弃置一张牌；2.令其摸一张牌，然后弃置X张牌（X为你已损失的体力值）。\n〖锐军〗：群势力技，你体力上限为2☯。当你于出牌阶段内首次使用牌指定其他角色为目标后，你可以选择目标中一名角色并摸X+1张牌（X为你已损失的体力值）。若如此做，此阶段你对其使用牌无距离限制，其外的其他角色均视为不在你的攻击范围内。"],["袁术（旧）","野心家","〖矜名〗锁定技，回合开始时，你选择一至两项条件：1.回复过1点体力；2.弃置过两张牌；3.使用过三种类别的牌；4.造成过4点伤害。然后此回合结束时，你摸X张牌，若本回合未满足条件，则该选项失效（X为你本回合“矜名”选择的选项序号数）。\n〖枭噬〗出牌阶段限一次，你使用的牌可以额外指定一个目标（无距离限制），若此牌未造成伤害，你失去1点体力，然后恢复一个已失效的选项。\n〖庸肆〗：锁定技，若场上没有【玉玺】，视为你装备着【玉玺】；当你成为【知己知彼】的目标时，你展示所有手牌。"],["曹爽","野心家","〖念增〗：摸牌阶段，若你的手牌数不为最多，你可以多摸两张牌；出牌阶段开始时，若你的体力值不为最多，你可以视为使用一张【杀】；弃牌阶段开始前，若你的装备区牌数不为最多，你可以跳过此阶段。\n〖擅專〗：其他角色的判定阶段开始时，你可以将“念增”中的一个“不为最多”改为“唯一最多”，令其此阶段判定区内视为有【乐不思蜀】或【兵粮寸断】。"],["董卓（旧）","野心家","〖观势〗：出牌阶段限一次，你可以将一张【杀】当【火攻】指定所有势力的其中一名角色和任意名未确认势力角色使用，当此牌未对其中一名角色造成伤害时，此牌对剩余目标当【决斗】结算。出牌阶段你的牌因弃置或被其他角色获得时，你摸一张牌。\n〖掌戎〗：结束阶段，你摸X张牌（X为本回合你造成伤害的人数），若场上其他角色本回合均受到你造成的伤害，你失去1点体力。"],["公孙渊","野心家","〖怀异〗：出牌阶段限一次，你可以展示所有手牌，若其中包含两种颜色，你弃置其中一种颜色的牌，然后获得其他角色至多X张牌（X为弃牌数）并展示之，将以此法获得的装备牌置于你的武将牌上，称为“异”。若你本局游戏第一次发动〖怀异〗，可以立刻执行一个额外的摸牌阶段。\n〖封拜〗：回合开始时，你可以使用一张“异”。\n〖恣睢〗：摸牌阶段，你多摸X张牌；结束阶段，若X大于你的体力上限，你死亡。若你以此法死亡，观看所有角色手牌，并弃置所有区域的装备牌。（X为“异”数）"],["司马师","野心家","〖景略〗：出牌阶段限一次，你可以将一张牌背面朝上置于一名其他角色的武将牌上，称为“死士”。该角色使用牌时，你可以弃置一张对应花色的“死士”牌并令之无效。其他角色的回合结束后，若其弃置过与其武将牌上“死士”牌花色相同的牌，你可以弃置一张对应花色的“死士”牌并获得之。\n〖泰然〗：每名角色的回合结束阶段，你将手牌摸至体力上限；其他角色的弃牌阶段开始时，你可以展示并交给其两张牌，令其本阶段不能弃置这些牌，然后你可以于其本阶段结束时获得本阶段弃置的一张牌。"],["孙綝（旧）","野心家","〖嗜戮〗当一名角色死亡时，你可将其所有武将牌置于你的武将牌旁，称为“戮”，若你为来源，你从剩余武将牌堆顶额外获得三张“戮”。你的回合内限一次，准备/出牌/结束阶段开始前，你可弃置至多X张牌（X为“戮”的武将势力数量），摸等量的牌。\n结束阶段，若你的副将发动过技能，你变更副将为“戮”没有的势力（先变后换，无则不变）；以此法被变更的副将改为放置于“戮”中。\n〖凶虐〗出牌阶段开始时，你可以移去一张“戮”，令你本回合对此“戮”势力角色获得下列效果中的一项：1.对其造成伤害时，令此伤害+1；2.对其造成伤害时，你获得其一张牌；3.对其使用牌无次数限制。\n出牌阶段结束时，你可移去两张“戮”，然后直到你的下回合开始时，移去的“戮”势力相同的角色第一次对你造成伤害时，此伤害-1。\n〖作威〗：你可于以下时机弃置一张“戮”：出牌阶段（限一次），结束阶段（限一次），当你受到伤害后，然后你选择并拥有其中一个技能直到时机结束或你发动完此技能或你再次发动此技能。"],["司马伦","野心家","〖惑邪〗：每回合限一次，当你需要使用任意一种基本牌或普通锦囊牌时，你可以进行一次判定，若结果与所有“巫”的花色均不相同或符合你声明的牌名，将此牌置于你的武将牌上，称为“巫”，视为使用你声明的牌。每轮开始时，若“巫”达到四张，你将所有“巫”交给其他角色，然后未以此法获得牌的角色本轮对除你以外的角色使用【杀】时伤害+1。\n〖助澜〗：当一名其他角色受到伤害时，若伤害来源与其势力相同，你可以弃置一张牌令此伤害+1。\n〖乱常〗：限定技，一名角色的回合结束时，若本回合你受到过伤害，你可以令当前回合角色将所有手牌（至少一张）当【万箭齐发】使用。若本回合有角色以此法死亡，此技能回合结束后视为未发动过。"],["李傕郭汜","野心家","贪狈：出牌阶段限一次，你可以令一名其他角色选择一项：1.令你获得其一张手牌，然后你本回合使用牌不能指定其为目标；2.本回合你对其使用牌无距离和次数限制。\n〖策算〗：出牌阶段内各限一次：1.当你对一名其他角色连续使用两张牌后，你可以将一张手牌当【顺手牵羊】对其使用（需距离）。2.当你使用的普通锦囊牌结算结束后，若此牌仍在弃牌堆，你可以失去1点体力，获得之。\n〖凶算〗：限定技，出牌阶段，你可以弃置一张手牌并选择一名角色，对其造成1点伤害，然后你摸三张牌。若该角色有已发动的限定技，则你选择其一个限定技，此回合结束后视为该限定技未发动过。"],["钟会","野心家","〖肆恣〗回合内各限两次，当你造成伤害后，你可以摸此牌牌名字数张牌，然后将1张牌置于武将牌上，称为“权”。\n[权计]:回合外每回合各限一次，当你受到伤害后，你可以摸本次伤害点数张牌，然后将1张牌置于武将牌上，称为“权”。\n〖自立〗：你的手牌上限+X(X为“权\"的数量且至多为6)。\n[排异]:出牌阶段每项限一次，你可以移去一张“权”，然后选择一项:1.你摸X张牌;2.令一名其他角色摸X张牌。若其手牌多于你，你对其造成1点伤害。"],["十常侍","野心家","〖党锢〗：锁定技，你拥有第两名副将。当你首次明置此武将时，你获得九张武将牌，称为“常侍”牌，然后将其中一张武将作为第二名副将。当你首次获得“常侍”牌时，你可以重置至多X张“常侍”牌（X为你的体力上限）。\n〖殁亡〗：锁定技，当你死亡时，若你拥有〖党锢〗，且你有未亮出的“常侍”牌，则你移除当前两张副将，从剩余的“常侍”牌中选择两张武将牌作为副将，将体力值回复至1点，重置两张牌然后摸一张牌。"]];
const DESC_MAP = {};
GENERALS.forEach(g=>{ DESC_MAP[g[0]] = g[2]||""; });
const STORE_KEY = "sgs_general_vote_v4";
let stats = loadStats();
let cur = [0,1];
function loadStats(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const s = {};
  GENERALS.forEach(g=>{ s[g[0]] = {win:0, games:0, score:0, faction:g[1]}; });
  return s;
}
function saveStats(){ localStorage.setItem(STORE_KEY, JSON.stringify(stats)); }
function ensure(name,faction){ if(!stats[name]) stats[name]={win:0,games:0,score:0,faction:faction}; }
function pickTwo(){
  let a = Math.floor(Math.random()*GENERALS.length);
  let b = Math.floor(Math.random()*GENERALS.length);
  while(b===a) b = Math.floor(Math.random()*GENERALS.length);
  return [a,b];
}
function nextPair(){
  cur = pickTwo();
  const A = GENERALS[cur[0]], B = GENERALS[cur[1]];
  document.getElementById("nameA").textContent = A[0];
  document.getElementById("nameB").textContent = B[0];
  document.getElementById("descA").textContent = A[2] || "";
  document.getElementById("descB").textContent = B[2] || "";
  const fa = document.getElementById("facA"), fb = document.getElementById("facB");
  fa.textContent = A[1]; fb.textContent = B[1];
  fa.className = "faction " + (FACTION_CLASS[A[1]]||"f-amb");
  fb.className = "faction " + (FACTION_CLASS[B[1]]||"f-amb");
  document.getElementById("descA").scrollTop = 0;
  document.getElementById("descB").scrollTop = 0;
}
function vote(side){
  const winIdx = cur[side], loseIdx = cur[side===0?1:0];
  const win = GENERALS[winIdx], lose = GENERALS[loseIdx];
  ensure(win[0],win[1]); ensure(lose[0],lose[1]);
  stats[win[0]].win += 1;  stats[win[0]].games += 1;  stats[win[0]].score += 1;
  stats[lose[0]].games += 1; stats[lose[0]].score -= 1;
  saveStats();
  bumpCount();
  nextPair();
}
function bumpCount(){
  let total = 0;
  Object.values(stats).forEach(s=> total += s.games);
  document.getElementById("voteCount").textContent = Math.round(total/2);
}
const TIER_NAMES = ["超大杯上","超大杯中","超大杯下","大杯上","大杯中","大杯下","中杯上","中杯中","中杯下"];
function toggleView(){
  const v = document.getElementById("votePanel");
  const s = document.getElementById("statsPanel");
  const btn = document.getElementById("navBtn");
  if(s.classList.contains("active")){
    s.classList.remove("active"); v.classList.remove("hidden"); btn.textContent="总数据";
  }else{
    s.classList.add("active"); v.classList.add("hidden"); btn.textContent="去投票"; renderStats();
  }
}
function rankedList(){
  const rows = Object.keys(stats).map(name=>{
    const d = stats[name];
    const rate = d.games>0 ? d.win/d.games : 0;
    return {name, faction:d.faction, games:d.games, win:d.win, rate, score:d.score};
  }).filter(r=>r.games>0);
  rows.sort((a,b)=> b.rate-a.rate || b.score-a.score);
  return rows;
}
function tierName(i, tiers){
  const idx = Math.min(TIER_NAMES.length-1, Math.floor(i * TIER_NAMES.length / tiers));
  return TIER_NAMES[idx];
}
function renderStats(){
  const rows = rankedList();
  const body = document.getElementById("statsBody");
  if(rows.length===0){ body.innerHTML = '<div class="empty">还没有投票数据，先去投几票吧～</div>'; return; }
  let tiers = parseInt(document.getElementById("tierCount").value)||9;
  tiers = Math.max(3, Math.min(9, tiers));
  const n = rows.length;
  let html = '<table><thead><tr><th>杯级</th><th>排名</th><th>武将</th><th>势力</th><th>出场</th><th>胜率</th><th>得分</th></tr></thead><tbody>';
  rows.forEach((r,i)=>{
    const tIdx = Math.min(tiers-1, Math.floor(i * tiers / n));
    const tName = tierName(tIdx, tiers);
    html += '<tr><td class="tier-cell t'+tIdx+'">'+tName+'</td><td>'+(i+1)+'</td><td class="name-cell"><a class="name-link" onclick="showSkill(\''+encodeURIComponent(r.name)+'\')">'+r.name+'</a></td><td>'+r.faction+'</td><td>'+r.games+'</td><td>'+(r.rate*100).toFixed(1)+'%</td><td>'+r.score.toFixed(0)+'</td></tr>';
  });
  html += '</tbody></table>';
  body.innerHTML = html;
}
function exportCSV(){
  const rows = rankedList();
  let csv = "\uFEFF排名,武将,势力,出场次数,得票次数,胜率,得分\n";
  rows.forEach((r,i)=>{
    csv += (i+1)+','+'"'+r.name+'"'+','+r.faction+','+r.games+','+r.win+','+(r.rate*100).toFixed(1)+'%,'+r.score+'\n';
  });
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "武将强度投票数据.csv";
  a.click();
}
function resetData(){
  if(!confirm("确定清空所有投票数据吗？此操作不可恢复。")) return;
  localStorage.removeItem(STORE_KEY);
  stats = loadStats();
  bumpCount(); renderStats();
}
function showSkill(encName){
  const name = decodeURIComponent(encName);
  const g = GENERALS.find(x=>x[0]===name);
  document.getElementById("mName").textContent = name;
  const facEl = document.getElementById("mFac");
  const fac = g ? g[1] : "";
  facEl.textContent = fac;
  facEl.className = "m-fac " + (FACTION_CLASS[fac]||"f-amb");
  document.getElementById("mBody").textContent = (g && g[2]) ? g[2] : "（暂无技能描述）";
  document.getElementById("skillMask").classList.add("show");
}
function closeSkill(){ document.getElementById("skillMask").classList.remove("show"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeSkill(); });
document.getElementById("genTotal").textContent = GENERALS.length;
bumpCount();
nextPair();
</script>
