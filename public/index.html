<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三国杀武将强度投票箱</title>
<style>
  :root{
    --bg:#eef2f7; --bg2:#e3e9f2; --card:#ffffff; --ink:#2c3440; --sub:#6b7688;
    --line:#dfe5ee; --accent:#5b7cbe; --accent2:#8aa4d6; --shadow:0 8px 24px rgba(60,80,120,.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(135deg,var(--bg),var(--bg2));
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px; background:rgba(255,255,255,.75);
    backdrop-filter:blur(6px); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;
  }
  header .brand{font-size:20px; font-weight:800; letter-spacing:1px;}
  header .brand small{font-weight:500; color:var(--sub); font-size:13px; margin-left:8px;}
  header nav button{
    border:none; background:var(--accent); color:#fff; cursor:pointer;
    padding:9px 18px; border-radius:10px; font-size:14px; font-weight:600;
    transition:.15s; box-shadow:0 3px 10px rgba(91,124,190,.3);
  }
  header nav button:hover{background:#496aa8;}
  .wrap{max-width:1180px; margin:0 auto; padding:32px 20px 60px;}
  .vote-head{text-align:center; margin-bottom:20px;}
  .vote-head h1{font-size:26px; margin:0 0 6px;}
  .vote-head p{color:var(--sub); margin:0; font-size:14px;}
  .criteria{
    max-width:760px; margin:14px auto 0; text-align:center; font-size:13.5px; color:#5a6b8c;
    background:#eef3fb; border:1px solid #dde6f5; border-radius:12px; padding:10px 18px; line-height:1.7;
  }
  .criteria b{color:var(--accent);}
  .counter{text-align:center; color:var(--sub); font-size:13px; margin-top:12px;}
  
  /* 四宫格布局 */
  .arena{
    display:grid; grid-template-columns:1fr 1fr; gap:20px;
    margin-top:22px; max-width:1000px; margin-left:auto; margin-right:auto;
  }
  .team-label{
    grid-column:1/-1; text-align:center; font-size:18px; font-weight:700;
    color:var(--accent); padding:8px; background:rgba(91,124,190,.08);
    border-radius:10px;
  }
  .pick{
    background:var(--card); border:2px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center;
    padding:20px 16px 16px; cursor:pointer; transition:.18s; position:relative; overflow:hidden;
    min-height:280px;
  }
  .pick:hover{transform:translateY(-3px); border-color:var(--accent2); box-shadow:0 12px 28px rgba(60,80,120,.16);}
  .pick.selected{border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,124,190,.25);}
  .pick .faction{
    font-size:15px; font-weight:700; color:#fff; padding:4px 16px; border-radius:18px;
    margin-bottom:10px; letter-spacing:1px;
  }
  .pick .name{font-size:24px; font-weight:800; text-align:center; line-height:1.2; margin-bottom:10px;}
  .pick .desc{
    width:100%; flex:1; color:#4a5568; font-size:13px; line-height:1.65;
    text-align:left; white-space:pre-line; overflow-y:auto; padding:10px 12px;
    background:#f6f8fc; border:1px solid #edf1f8; border-radius:10px; max-height:160px;
  }
  .pick .hint{margin-top:10px; color:var(--sub); font-size:12px;}
  
  .vs-divider{
    grid-column:1/-1; text-align:center; font-size:22px; font-weight:900; color:var(--accent);
    padding:6px;
  }
  
  .skipbar{text-align:center; margin-top:24px;}
  .skipbar button{
    border:1px solid var(--line); background:#fff; color:var(--sub);
    padding:9px 22px; border-radius:10px; cursor:pointer; font-size:14px; transition:.15s;
  }
  .skipbar button:hover{color:var(--accent); border-color:var(--accent2);}
  
  .f-wei{background:#4a6fa5;} .f-shu{background:#3f9d6b;}
  .f-wu{background:#c8514e;} .f-qun{background:#8a7a4e;}
  .f-dual{background:#7a5ea8;} .f-amb{background:#555c66;} .f-yin{background:#4c8aa0;}
  
  .stats-panel{display:none;}
  .stats-panel.active{display:block;}
  .vote-panel.hidden{display:none;}
  
  /* 榜单Tab */
  .stats-tabs{display:flex; gap:0; margin-bottom:16px; border-radius:10px; overflow:hidden; border:1px solid var(--line);}
  .stats-tabs button{
    flex:1; border:none; background:#fff; color:var(--sub); padding:10px;
    font-size:14px; font-weight:600; cursor:pointer; transition:.15s;
  }
  .stats-tabs button.active{background:var(--accent); color:#fff;}
  .stats-tabs button:hover:not(.active){background:#f0f4fb;}
  
  .stats-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px;}
  .stats-head h2{margin:0; font-size:22px;}
  .stats-tools{display:flex; align-items:center; gap:14px; font-size:13px; color:var(--sub);}
  .stats-tools label{display:flex; align-items:center; gap:6px;}
  .stats-tools input{width:56px; padding:4px 6px; border:1px solid var(--line); border-radius:6px;}
  .stats-tools button{
    border:none; background:var(--accent); color:#fff; padding:7px 14px;
    border-radius:8px; cursor:pointer; font-size:13px;
  }
  table{width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; box-shadow:var(--shadow);}
  thead th{background:#eaf0fb; color:#3a4a66; font-size:15px; padding:14px 10px; text-align:center;}
  tbody td{padding:11px 10px; text-align:center; border-top:1px solid #f0f3f8; font-size:14px;}
  tbody tr:nth-child(even){background:#fafbfe;}
  .tier-cell{color:#fff; font-weight:700; min-width:86px;}
  .name-cell{font-weight:700;}
  .empty{text-align:center; color:var(--sub); padding:40px; font-size:15px;}
  .t0{background:#c0504d;} .t1{background:#d47a5a;} .t2{background:#dca24e;}
  .t3{background:#c9b85a;} .t4{background:#8faf6a;} .t5{background:#5fa0a0;}
  .t6{background:#5b7cbe;} .t7{background:#7a6fa8;} .t8{background:#8a8f99;}
  .name-link{color:var(--accent); cursor:pointer; text-decoration:none; border-bottom:1px dashed var(--accent2);}
  .name-link:hover{color:#3a5a99; border-bottom-style:solid;}
  
  /* MVP选择弹窗 */
  .mvp-mask{
    display:none; position:fixed; inset:0; background:rgba(30,40,60,.5);
    z-index:200; align-items:center; justify-content:center; padding:20px;
  }
  .mvp-mask.show{display:flex;}
  .mvp-box{
    background:#fff; border-radius:16px; max-width:480px; width:100%;
    box-shadow:0 20px 60px rgba(30,40,60,.35); padding:28px; text-align:center;
    animation:pop .16s ease;
  }
  @keyframes pop{from{transform:scale(.94); opacity:0;} to{transform:scale(1); opacity:1;}}
  .mvp-box h3{margin:0 0 8px; font-size:20px;}
  .mvp-box p{color:var(--sub); margin:0 0 20px; font-size:14px;}
  .mvp-options{display:flex; gap:16px; justify-content:center;}
  .mvp-option{
    flex:1; border:2px solid var(--line); border-radius:12px; padding:16px;
    cursor:pointer; transition:.15s;
  }
  .mvp-option:hover{border-color:var(--accent); background:#f0f4fb;}
  .mvp-option .mvp-name{font-size:20px; font-weight:800; margin-bottom:6px;}
  .mvp-option .mvp-fac{font-size:13px; color:#fff; padding:3px 12px; border-radius:14px; display:inline-block;}
  
  .modal-mask{
    display:none; position:fixed; inset:0; background:rgba(30,40,60,.45);
    z-index:100; align-items:center; justify-content:center; padding:20px;
  }
  .modal-mask.show{display:flex;}
  .modal-box{
    background:#fff; border-radius:16px; max-width:560px; width:100%; max-height:80vh;
    overflow:hidden; box-shadow:0 20px 60px rgba(30,40,60,.35); display:flex; flex-direction:column;
    animation:pop .16s ease;
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 22px; border-bottom:1px solid var(--line);
  }
  .modal-head .m-name{font-size:24px; font-weight:800;}
  .modal-head .m-fac{font-size:14px; color:#fff; padding:4px 14px; border-radius:16px; margin-left:12px; font-weight:700; letter-spacing:1px;}
  .modal-head .m-close{
    border:none; background:#eef2f7; color:var(--sub); width:34px; height:34px; border-radius:50%;
    font-size:20px; cursor:pointer; line-height:1;
  }
  .modal-head .m-close:hover{background:#e0e6ef; color:var(--ink);}
  .modal-body{
    padding:20px 22px; overflow-y:auto; white-space:pre-line;
    font-size:15px; line-height:1.85; color:#3a4658;
  }
  footer{text-align:center; color:var(--sub); font-size:12px; padding:20px;}
</style>
</head>
<body>
<header>
  <div class="brand">三国杀武将强度投票箱 <small>国战·双人对决</small></div>
  <nav><button id="navBtn" onclick="toggleView()">总数据</button></nav>
</header>
<div class="wrap">
  <section class="vote-panel" id="votePanel">
    <div class="vote-head">
      <h1>三国杀武将强度投票箱</h1>
      <p>双人对双人 · 点击你认为更强的队伍，再选MVP</p>
      <div class="criteria">请<b>综合评价该双人组合的整体强度</b>，综合考量其<b>配合能力、残局能力、输出能力、控场能力</b>等维度进行选择。</div>
      <div class="counter">已投票 <b id="voteCount">0</b> 次 · 共 <b id="genTotal">0</b> 名武将</div>
    </div>
    <div class="arena" id="arena">
      <div class="team-label">🔵 队伍A</div>
      <div class="team-label" onclick="selectTeam('A')" style="cursor:pointer"> 队伍A</div>
      <div class="pick" id="pickA1">
        <span class="faction" id="facA1"></span>
        <span class="name" id="nameA1"></span>
        <div class="desc" id="descA1"></div>
      </div>
      <div class="pick" id="pickA2">
        <span class="faction" id="facA2"></span>
        <span class="name" id="nameA2"></span>
        <div class="desc" id="descA2"></div>
      </div>
      <div class="vs-divider">⚔️ VS ⚔️</div>
      <div class="team-label" onclick="selectTeam('B')" style="cursor:pointer"> 队伍B</div>
      <div class="pick" id="pickB1">
        <span class="faction" id="facB1"></span>
        <span class="name" id="nameB1"></span>
        <div class="desc" id="descB1"></div>
      </div>
      <div class="pick" id="pickB2">
        <span class="faction" id="facB2"></span>
        <span class="name" id="nameB2"></span>
        <div class="desc" id="descB2"></div>
      </div>
    </div>
    <div class="skipbar"><button onclick="nextMatch()">跳过这一组 →</button></div>
  </section>
  <section class="stats-panel" id="statsPanel">
    <div class="stats-tabs">
      <button class="active" id="tabPair" onclick="switchTab('pair')">双人榜单</button>
      <button id="tabSolo" onclick="switchTab('solo')">单人榜单</button>
    </div>
    <div class="stats-head">
      <h2 id="statsTitle">双人组合强度榜</h2>
      <div style="font-size:13px;color:var(--sub);margin-bottom:8px;">规则：胜率 = 得票次数 / 出场次数 · 势力为"隐"的武将不参与</div>
      <div class="stats-tools">
        <label>分层数 <input type="number" id="tierCount" value="9" min="3" max="9" onchange="renderStats()"></label>
        <button onclick="exportCSV()">导出 CSV</button>
        <button onclick="resetData()" style="background:#c8514e;">清空数据</button>
        <div style="font-size:12px;color:var(--sub);margin-top:4px;">需要密码请联系管理员</div>
      </div>
    </div>
    <div id="statsBody"></div>
  </section>
</div>

<!-- MVP选择弹窗 -->
<div class="mvp-mask" id="mvpMask">
  <div class="mvp-box">
    <h3>🏆 选出本队MVP</h3>
    <p>这支获胜队伍中，谁的作用更大？</p>
    <div class="mvp-options" id="mvpOptions"></div>
  </div>
</div>

<!-- 技能详情弹窗 -->
<div class="modal-mask" id="skillMask" onclick="if(event.target===this)closeSkill()">
  <div class="modal-box">
    <div class="modal-head">
      <div><span class="m-name" id="mName"></span><span class="m-fac" id="mFac"></span></div>
      <button class="m-close" onclick="closeSkill()">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>
<footer></footer>
<script>
const FACTION_CLASS = {
  "魏": "f-wei", "蜀": "f-shu", "吴": "f-wu", "群": "f-qun",
  "双势力": "f-dual", "野心家": "f-amb", "隐": "f-yin"
};

let cachedGenerals = [];
let curMatch = null; // {teamA:[idx,idx], teamB:[idx,idx]}
let currentTab = 'pair';

// 从服务器加载武将数据
async function loadGenerals() {
  try {
    const response = await fetch('/api/generals');
    if (response.ok) return await response.json();
  } catch (e) { console.error('加载武将数据失败:', e); }
  return [];
}

// 初始化
async function init() {
  cachedGenerals = await loadGenerals();
  if (cachedGenerals.length > 0) {
    document.getElementById("genTotal").textContent = cachedGenerals.length;
    nextMatch();
  } else {
    alert('无法加载武将数据，请检查服务器连接');
  }
}

// 势力组合校验：严格同势力组队，野心家可与任意非野心家组队
// "双势力"武将(如魏/吴)的faction字段就是"魏/吴"，它本身是跨势力的
// 所以魏/吴可以和魏组队(都含魏)，也可以和吴组队(都含吴)
function isValidPair(g1, g2) {
  const f1 = g1[1], f2 = g2[1];
  
  // 禁止双野心家
  if (f1 === '野心家' && f2 === '野心家') return false;
  
  // 野心家+任意非野心家 ✓
  if ((f1 === '野心家' && f2 !== '野心家') || (f2 === '野心家' && f1 !== '野心家')) return true;
  
  // 完全相同势力 ✓ (包括都是"魏/吴")
  if (f1 === f2) return true;
  
  // 双势力武将兼容判断：
  // 如果f1包含"/"(如"魏/吴")，检查f2是否是f1的组成部分
  if (f1.includes('/') && f1.split('/').includes(f2)) return true;
  // 如果f2包含"/"(如"魏/吴")，检查f1是否是f2的组成部分
  if (f2.includes('/') && f2.split('/').includes(f1)) return true;
  
  // 其他情况都不合法
  return false;
}

// 生成合法的双人组合
function pickValidPair(excludeIndices = new Set()) {
  let attempts = 0;
  while (attempts < 500) {
    let a = Math.floor(Math.random() * cachedGenerals.length);
    let b = Math.floor(Math.random() * cachedGenerals.length);
    if (a === b || excludeIndices.has(a) || excludeIndices.has(b)) { attempts++; continue; }
    if (isValidPair(cachedGenerals[a], cachedGenerals[b])) return [a, b];
    attempts++;
  }
  // fallback: 随便返回两个不同的
  let a = 0, b = 1;
  while (b === a || excludeIndices.has(a) || excludeIndices.has(b)) b = (b + 1) % cachedGenerals.length;
  return [a, b];
}

// 生成一场对决
function nextMatch() {
  const used = new Set();
  const teamA = pickValidPair(used);
  teamA.forEach(i => used.add(i));
  const teamB = pickValidPair(used);
  curMatch = { teamA, teamB };
  
  renderPick('A1', teamA[0]);
  renderPick('A2', teamA[1]);
  renderPick('B1', teamB[0]);
  renderPick('B2', teamB[1]);
  
  // 清除选中状态
  document.querySelectorAll('.pick').forEach(el => el.classList.remove('selected'));
}

function renderPick(id, idx) {
  const g = cachedGenerals[idx];
  document.getElementById("name" + id).textContent = g[0];
  document.getElementById("desc" + id).textContent = g[2] || "";
  const facEl = document.getElementById("fac" + id);
  facEl.textContent = g[1];
  facEl.className = "faction " + (FACTION_CLASS[g[1]] || "f-amb");
  document.getElementById("desc" + id).scrollTop = 0;
}

// 点击队伍 → 弹出MVP选择
function selectTeam(team) {
  const winnerTeam = team === 'A' ? curMatch.teamA : curMatch.teamB;
  const loserTeam = team === 'A' ? curMatch.teamB : curMatch.teamA;
  
  // 高亮选中队伍
  document.querySelectorAll('.pick').forEach(el => el.classList.remove('selected'));
  if (team === 'A') {
    document.getElementById('pickA1').classList.add('selected');
    document.getElementById('pickA2').classList.add('selected');
  } else {
    document.getElementById('pickB1').classList.add('selected');
    document.getElementById('pickB2').classList.add('selected');
  }
  
  // 显示MVP弹窗
  const opts = document.getElementById('mvpOptions');
  opts.innerHTML = '';
  winnerTeam.forEach(idx => {
    const g = cachedGenerals[idx];
    const div = document.createElement('div');
    div.className = 'mvp-option';
    div.innerHTML = `<div class="mvp-name">${g[0]}</div><span class="mvp-fac ${FACTION_CLASS[g[1]] || 'f-amb'}">${g[1]}</span>`;
    div.onclick = () => submitVote(winnerTeam, loserTeam, g[0]);
    opts.appendChild(div);
  });
  document.getElementById('mvpMask').classList.add('show');
}

// 提交投票
async function submitVote(winnerTeam, loserTeam, mvp) {
  document.getElementById('mvpMask').classList.remove('show');
  const payload = {
    teamA: curMatch.teamA.map(i => cachedGenerals[i][0]),
    teamB: curMatch.teamB.map(i => cachedGenerals[i][0]),
    winnerTeam: winnerTeam === curMatch.teamA ? 'A' : 'B',
    mvp
  };
  
  try {
    const response = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (response.ok) {
      bumpCount();
      nextMatch();
    } else {
      alert('投票提交失败，请重试');
    }
  } catch (e) {
    console.error('投票失败:', e);
    alert('网络错误，请检查连接');
  }
}

async function bumpCount() {
  try {
    const response = await fetch('/api/stats');
    if (response.ok) {
      const data = await response.json();
      document.getElementById("voteCount").textContent = data.total_votes || 0;
    }
  } catch (e) { console.error('获取统计失败:', e); }
}

const TIER_NAMES = ["超大杯上","超大杯中","超大杯下","大杯上","大杯中","大杯下","中杯上","中杯中","中杯下"];

function toggleView() {
  const v = document.getElementById("votePanel");
  const s = document.getElementById("statsPanel");
  const btn = document.getElementById("navBtn");
  if (s.classList.contains("active")) {
    s.classList.remove("active"); 
    v.classList.remove("hidden"); 
    btn.textContent = "总数据";
  } else {
    s.classList.add("active"); 
    v.classList.add("hidden"); 
    btn.textContent = "去投票"; 
    renderStats();
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabPair').classList.toggle('active', tab === 'pair');
  document.getElementById('tabSolo').classList.toggle('active', tab === 'solo');
  document.getElementById('statsTitle').textContent = tab === 'pair' ? '双人组合强度榜' : '单人武将作用榜';
  renderStats();
}

async function rankedList() {
  try {
    const response = await fetch('/api/results?tab=' + currentTab);
    if (response.ok) return await response.json();
  } catch (e) { console.error('获取结果失败:', e); }
  return [];
}

function tierName(i, tiers) {
  const idx = Math.min(TIER_NAMES.length - 1, Math.floor(i * TIER_NAMES.length / tiers));
  return TIER_NAMES[idx];
}

async function renderStats() {
  const rows = await rankedList();
  const body = document.getElementById("statsBody");
  if (rows.length === 0) { 
    body.innerHTML = '<div class="empty">还没有投票数据，先去投几票吧～</div>'; 
    return; 
  }
  let tiers = parseInt(document.getElementById("tierCount").value) || 9;
  tiers = Math.max(3, Math.min(9, tiers));
  const n = rows.length;
  
  let html;
  if (currentTab === 'pair') {
    html = '<table><thead><tr><th>杯级</th><th>排名</th><th>组合</th><th>出场</th><th>胜率</th><th>得分</th></tr></thead><tbody>';
    rows.forEach((r, i) => {
      const tIdx = Math.min(tiers - 1, Math.floor(i * tiers / n));
      html += '<tr><td class="tier-cell t' + tIdx + '">' + tierName(tIdx, tiers) + '</td><td>' + (i+1) + '</td><td class="name-cell">' + r.pair + '</td><td>' + r.games + '</td><td>' + (r.rate*100).toFixed(1) + '%</td><td>' + r.score.toFixed(0) + '</td></tr>';
    });
  } else {
    html = '<table><thead><tr><th>杯级</th><th>排名</th><th>武将</th><th>势力</th><th>MVP次数</th><th>MVP率</th></tr></thead><tbody>';
    rows.forEach((r, i) => {
      const tIdx = Math.min(tiers - 1, Math.floor(i * tiers / n));
      html += '<tr><td class="tier-cell t' + tIdx + '">' + tierName(tIdx, tiers) + '</td><td>' + (i+1) + '</td><td class="name-cell"><a class="name-link" onclick="showSkill(\'' + encodeURIComponent(r.name) + '\')">' + r.name + '</a></td><td>' + r.faction + '</td><td>' + r.mvpCount + '</td><td>' + (r.mvpRate*100).toFixed(1) + '%</td></tr>';
    });
  }
  html += '</tbody></table>';
  body.innerHTML = html;
}

async function exportCSV() {
  try { window.location.href = '/api/export?tab=' + currentTab; }
  catch (e) { console.error('导出失败:', e); alert('导出失败'); }
}

async function resetData() {
  const pwd = prompt("请输入管理员密码：");
  if (pwd !== "jinwandalaohu") { alert("密码错误"); return; }
  if (!confirm("确定清空所有投票数据吗？此操作不可恢复。")) return;
  try {
    const response = await fetch('/api/reset', { 
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (response.ok) {
      alert('数据已清空');
      renderStats();
      bumpCount();
    } else {
      const err = await response.json().catch(() => ({}));
      alert(err.error || '清空失败');
    }
  } catch (e) {
    console.error('清空失败:', e);
    alert('网络错误');
  }
}

async function showSkill(encName) {
  const name = decodeURIComponent(encName);
  const g = cachedGenerals.find(x => x[0] === name);
  document.getElementById("mName").textContent = name;
  const facEl = document.getElementById("mFac");
  const fac = g ? g[1] : "";
  facEl.textContent = fac;
  facEl.className = "m-fac " + (FACTION_CLASS[fac] || "f-amb");
  document.getElementById("mBody").textContent = (g && g[2]) ? g[2] : "（暂无技能描述）";
  document.getElementById("skillMask").classList.add("show");
}

function closeSkill() { document.getElementById("skillMask").classList.remove("show"); }
document.addEventListener("keydown", e => { if (e.key === "Escape") { closeSkill(); document.getElementById("mvpMask").classList.remove("show"); } });

init();
</script>
